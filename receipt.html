<!DOCTYPE html>
<html>
<head>
  <title>Receipt - Righteous POS</title>

  <style>
    body {
      font-family: Arial;
      background: #fff;
      color: #000;
      padding: 20px;
    }

    .receipt {
      max-width: 300px;
      margin: auto;
      border: 1px dashed #000;
      padding: 10px;
    }

    h2 {
      text-align: center;
      margin: 0;
    }

    .info {
      font-size: 12px;
      text-align: center;
      margin-bottom: 10px;
    }

    .item {
      border-bottom: 1px dashed #ccc;
      padding: 5px 0;
      font-size: 13px;
    }

    .total {
      font-weight: bold;
      text-align: right;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    @media print {
      button {
        display: none;
      }
    }
  </style>
</head>

<body>

<div class="receipt">

  <h2>Righteous POS</h2>
  <div class="info">
    Asante Akyem Agogo <br>
    Tel: 0240416413 / 0248662358
  </div>

  <div id="items"></div>

  <div class="total" id="total"></div>

  <button onclick="window.print()">Print Receipt</button>

</div>

<script>
const sale = JSON.parse(localStorage.getItem("lastSale"));

let html = "";
let total = 0;

sale.items.forEach(i => {
  html += `
    <div class="item">
      ${i.name} x ${i.qty} = GH₵ ${i.total}
    </div>
  `;
  total += i.total;
});

document.getElementById("items").innerHTML = html;
document.getElementById("total").innerText = "Total: GH₵ " + total;
</script>

</body>
</html>
