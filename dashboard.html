<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Righteous POS - Dashboard</title>
  <!-- Load Tailwind CSS via CDN for layout utility -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Load Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    /* Integrated from your core branding layout */
    .topbar {
      background: #111827;
      padding: 15px;
      text-align: justify;
      font-size: 22px;
      color: #fbbf24; /* Gold */
      font-weight: bold;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col font-sans antialiased">

  <!-- Top Navigation Bar -->
  <div class="topbar flex justify-between items-center px-6 shadow-md">
    <div class="flex items-center gap-3">
      <span>Righteous Phones & Accessories</span>
    </div>
    <div class="flex gap-4 text-sm font-medium text-gray-300 items-center">
      <a href="dashboard.html" class="text-amber-400 border-b-2 border-amber-400 pb-1">Checkout</a>
      <a href="products.html" class="hover:text-amber-400 transition">Inventory Manager</a>
      <a href="sales.html" class="hover:text-amber-400 transition">Sales Logs</a>
      <span class="text-gray-600">|</span>
      <a href="#" onclick="triggerLogout(event)" class="text-rose-400 hover:text-rose-500 transition font-bold">Log Out</a>
    </div>
  </div>

  <!-- Main POS Workspace Layout -->
  <div class="flex flex-1 overflow-hidden h-[calc(100vh-62px)]">
    
    <!-- LEFT PANEL: Device Catalog -->
    <div class="w-2/3 p-6 flex flex-col h-full border-r border-gray-200">
      <div class="mb-4 flex gap-4">
        <input 
          type="text" 
          id="search-input"
          placeholder="Search devices or accessories..." 
          class="flex-1 p-3 bg-white border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm"
        />
        <select 
          id="category-filter"
          class="p-3 bg-white border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm text-gray-600"
        >
          <option value="ALL">All Categories</option>
          <option value="Phone">Smartphones</option>
          <option value="Accessory">Accessories</option>
          <option value="Tablet">Tablets</option>
        </select>
      </div>

      <!-- Live Loading Indicator -->
      <div id="loading-state" class="text-center py-12 text-gray-500 font-medium">
        Connecting to Righteous-POS-DB...
      </div>

      <!-- Catalog Grid Dynamic Target -->
      <div id="catalog-grid" class="grid grid-cols-3 gap-4 overflow-y-auto flex-1 pr-2 custom-scrollbar hidden">
        <!-- Javascript renders card entries here -->
      </div>
    </div>

    <!-- RIGHT PANEL: Cashier Checkout Cart -->
    <div class="w-1/3 bg-white shadow-xl p-6 flex flex-col h-full justify-between">
      <div>
        <div class="border-b pb-3 mb-4 flex justify-between items-center">
          <h2 class="text-lg font-bold text-gray-800">Current Basket</h2>
          <button onclick="clearCart()" class="text-xs font-semibold text-rose-500 hover:underline">Clear All</button>
        </div>
        
        <!-- Cart Items Target Container -->
        <div id="cart-container" class="space-y-3 overflow-y-auto max-h-[40vh-20px] pr-1 custom-scrollbar">
          <!-- Active cart rows get injected here -->
          <p id="empty-cart-msg" class="text-gray-400 text-center py-12 text-sm">Basket empty. Tap grid items to add.</p>
        </div>
      </div>

      <!-- Transaction Submission Block -->
      <div class="border-t pt-4 space-y-4 bg-white">
        <!-- Payment Selector -->
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-2">Payment Channel</label>
          <div class="grid grid-cols-3 gap-2" id="payment-methods">
            <button onclick="setPaymentMethod('Cash')" id="btn-Cash" class="pay-btn p-2.5 text-xs font-bold border rounded-xl transition bg-gray-900 text-white border-gray-900">Cash</button>
            <button onclick="setPaymentMethod('Mobile Money')" id="btn-Mobile Money" class="pay-btn p-2.5 text-xs font-bold border rounded-xl transition bg-white text-gray-700 hover:bg-gray-50">MoMo</button>
            <button onclick="setPaymentMethod('Card')" id="btn-Card" class="pay-btn p-2.5 text-xs font-bold border rounded-xl transition bg-white text-gray-700 hover:bg-gray-50">Bank Card</button>
          </div>
        </div>

        <!-- Calculated Matrix -->
        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 space-y-2">
          <div class="flex justify-between text-xs text-gray-500 font-medium">
            <span>Subtotal Value:</span>
            <span id="subtotal-val">$0.00</span>
          </div>
          <div class="flex justify-between items-baseline pt-1 border-t border-dashed border-gray-200">
            <span class="text-sm font-bold text-gray-700">Total Amount Due:</span>
            <span id="total-val" class="text-2xl font-black text-emerald-600">$0.00</span>
          </div>
        </div>

        <!-- Finalize Submission -->
        <button 
          id="checkout-submit-btn"
          onclick="submitTransaction()"
          disabled
          class="w-full py-4 text-center rounded-xl font-bold text-white shadow-lg transition bg-gray-300 cursor-not-allowed text-sm tracking-wide uppercase"
        >
          Complete Processing
        </button>
      </div>

    </div>
  </div>

  <!-- CORE POS SYSTEM MOTOR -->
  <script>
    // 1. Core Supabase Credentials
    const SUPABASE_URL = 'https://ezdpxjjzemtxbmjyjmfi.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ddxoPTFqgbR2pNgQBzY_aA_OeldolSz';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- SECURE AUTHENTICATION GUARD CRADLE ---
    async function enforceSecurityGuard() {
      const { data: { session }, error } = await _supabase.auth.getSession();
      
      // If no live encrypted session is detected, redirect immediately to login portal
      if (!session || error) {
        window.location.href = 'login.html';
      } else {
        // Only fetch inventory data if user is fully authenticated
        pullFreshInventory();
      }
    }
    // Run validation instantly on engine ignition
    enforceSecurityGuard();
    // ------------------------------------------

    // 2. Local Operational States
    let localInventory = [];
    let transactionCart = [];
    let selectedPayment = 'Cash';

    // 3. Initialize & Fetch from Database
    async function pullFreshInventory() {
      document.getElementById('loading-state').classList.remove('hidden');
      document.getElementById('catalog-grid').classList.add('hidden');

      const { data, error } = await _supabase
        .from('products')
        .select('*')
        .order('name', { ascending: true });

      if (error) {
        alert("Database connection broke down: " + error.message);
        return;
      }

      localInventory = data || [];
      renderCatalog();
      
      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('catalog-grid').classList.remove('hidden');
    }

    // 4. Render Interface Elements
    function renderCatalog() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const catFilter = document.getElementById('category-filter').value;
      const grid = document.getElementById('catalog-grid');

      const filtered = localInventory.filter(item => {
        const matchesSearch = item.name.toLowerCase().includes(search);
        const matchesCat = catFilter === 'ALL' || item.category === catFilter;
        return matchesSearch && matchesCat;
      });

      grid.innerHTML = filtered.map(prod => {
        const outOfStock = prod.stock_quantity <= 0;
        return `
          <button 
            onclick="addItemToCart('${prod.id}')"
            ${outOfStock ? 'disabled' : ''}
            class="p-4 bg-white border border-gray-200 rounded-xl shadow-sm text-left flex flex-col justify-between transition hover:border-amber-500 hover:shadow-md ${outOfStock ? 'opacity-40 cursor-not-allowed' : ''}"
          >
            <div>
              <span class="text-[10px] font-bold text-amber-600 bg-amber-50 px-2 py-0.5 rounded-full uppercase font-mono tracking-wider">${prod.category}</span>
              <h3 class="font-bold text-gray-800 mt-2 text-sm line-clamp-2 h-10">${prod.name}</h3>
            </div>
            <div class="mt-3 flex justify-between items-baseline w-full border-t pt-2 border-gray-50">
              <span class="text-xs text-gray-400 font-medium">Stock: ${prod.stock_quantity}</span>
              <span class="text-base font-black text-emerald-600">$${Number(prod.selling_price).toFixed(2)}</span>
            </div>
          </button>
        `;
      }).join('');
    }

    // 5. Cart Management Mechanics
    function addItemToCart(id) {
      const product = localInventory.find(p => p.id === id);
      if (!product || product.stock_quantity <= 0) return;

      const existingCartItem = transactionCart.find(item => item.id === id);

      if (existingCartItem) {
        if (existingCartItem.quantity >= product.stock_quantity) {
          alert(`In-store floor ceiling reached. Only ${product.stock_quantity} pieces available.`);
          return;
        }
        existingCartItem.quantity += 1;
      } else {
        transactionCart.push({ ...product, quantity: 1 });
      }
      syncCartInterface();
    }

    function updateCartQuantity(id, change) {
      const cartItem = transactionCart.find(item => item.id === id);
      const product = localInventory.find(p => p.id === id);
      
      if (!cartItem) return;

      cartItem.quantity += change;

      if (cartItem.quantity > product.stock_quantity) {
        alert("Cannot scale order higher than absolute available stock metrics.");
        cartItem.quantity = product.stock_quantity;
      }

      if (cartItem.quantity <= 0) {
        transactionCart = transactionCart.filter(item => item.id !== id);
      }
      syncCartInterface();
    }

    function clearCart() {
      transactionCart = [];
      syncCartInterface();
    }

    function syncCartInterface() {
      const container = document.getElementById('cart-container');
      const emptyMsg = document.getElementById('empty-cart-msg');
      const submitBtn = document.getElementById('checkout-submit-btn');

      if (transactionCart.length === 0) {
        container.innerHTML = '';
        container.appendChild(emptyMsg);
        submitBtn.disabled = true;
        submitBtn.className = "w-full py-4 text-center rounded-xl font-bold text-white bg-gray-300 cursor-not-allowed text-sm uppercase";
        document.getElementById('subtotal-val').innerText = "$0.00";
        document.getElementById('total-val').innerText = "$0.00";
        return;
      }

      if (emptyMsg.parentNode) emptyMsg.remove();

      let grandTotal = 0;
      container.innerHTML = transactionCart.map(item => {
        const itemTotal = item.selling_price * item.quantity;
        grandTotal += itemTotal;
        return `
          <div class="flex justify-between items-center bg-gray-50 border border-gray-100 p-3 rounded-xl transition">
            <div class="flex-1 min-w-0 pr-2">
              <h4 class="font-bold text-gray-800 text-xs truncate">${item.name}</h4>
              <p class="text-[11px] text-gray-400 font-mono mt-0.5">$${Number(item.selling_price).toFixed(2)} each</p>
            </div>
            <div class="flex items-center gap-2">
              <div class="flex items-center border border-gray-200 bg-white rounded-lg overflow-hidden">
                <button onclick="updateCartQuantity('${item.id}', -1)" class="px-2 py-1 text-gray-500 hover:bg-gray-100 font-bold text-xs">-</button>
                <span class="px-2 text-xs font-mono font-bold text-gray-800">${item.quantity}</span>
                <button onclick="updateCartQuantity('${item.id}', 1)" class="px-2 py-1 text-gray-500 hover:bg-gray-100 font-bold text-xs">+</button>
              </div>
              <span class="font-mono font-bold text-xs text-gray-700 w-16 text-right">$${itemTotal.toFixed(2)}</span>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('subtotal-val').innerText = `$${grandTotal.toFixed(2)}`;
      document.getElementById('total-val').innerText = `$${grandTotal.toFixed(2)}`;
      
      submitBtn.disabled = false;
      submitBtn.className = "w-full py-4 text-center rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 shadow-md active:scale-[0.99] transition text-sm uppercase cursor-pointer";
    }

    function setPaymentMethod(method) {
      selectedPayment = method;
      document.querySelectorAll('.pay-btn').forEach(btn => {
        btn.className = "pay-btn p-2.5 text-xs font-bold border rounded-xl transition bg-white text-gray-700 hover:bg-gray-50";
      });
      document.getElementById(`btn-${method}`).className = "pay-btn p-2.5 text-xs font-bold border rounded-xl transition bg-gray-900 text-white border-gray-900";
    }

    // 6. Execute Transaction Pipeline Outbound to Supabase
    async function submitTransaction() {
      if (transactionCart.length === 0) return;

      const submitBtn = document.getElementById('checkout-submit-btn');
      submitBtn.disabled = true;
      submitBtn.innerText = "Processing Order...";

      const totalValue = transactionCart.reduce((sum, item) => sum + (item.selling_price * item.quantity), 0);

      try {
        const { data: invoice, error: invoiceError } = await _supabase
          .from('sales')
          .insert([{ total_amount: totalValue, payment_method: selectedPayment }])
          .select()
          .single();

        if (invoiceError) throw invoiceError;

        const lineItems = transactionCart.map(item => ({
          sale_id: invoice.id,
          product_id: item.id,
          quantity: item.quantity,
          price_at_sale: item.selling_price
        }));

        const { error: batchError } = await _supabase
          .from('sale_items')
          .insert(lineItems);

        if (batchError) throw batchError;

        alert("Transaction complete! Inventory updated automatically.");
        clearCart();
        await pullFreshInventory(); 
      } catch (err) {
        alert("Transaction Engine Fault: " + err.message);
      } finally {
        submitBtn.innerText = "Complete Processing";
      }
    }

    // 7. Session Termination Flow
    async function triggerLogout(e) {
      e.preventDefault();
      const confirmLog = confirm("Are you sure you want to log out of the POS system?");
      if (!confirmLog) return;
      
      await _supabase.auth.signOut();
      window.location.href = 'login.html';
    }

    // Bind Watchers to Input Controls for Dynamic Instant Searching
    document.getElementById('search-input').addEventListener('input', renderCatalog);
    document.getElementById('category-filter').addEventListener('change', renderCatalog);
  </script>
</body>
</html>
