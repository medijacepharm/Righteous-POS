<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Righteous POS - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">📱 Righteous POS</h1>
            <span id="cashierBadge" class="bg-blue-700 text-xs px-3 py-1 rounded-full font-semibold font-mono">Loading...</span>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-6 pb-28">
        
        <section class="bg-white p-5 rounded-xl shadow-xs border border-gray-200">
            <h2 class="text-lg font-bold text-gray-800 mb-3">1. Select Product</h2>
            
            <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Product Item</label>
            <select id="productSelect" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4">
                <option value="1" data-serialized="true">iPhone 15 Pro Max 256GB (Requires IMEI)</option>
                <option value="2" data-serialized="true">Galaxy S24 Ultra 512GB (Requires IMEI)</option>
                <option value="3" data-serialized="false">20W USB-C Power Adapter (Accessory)</option>
                <option value="4" data-serialized="false">Shockproof Clear Case iPhone 15 (Accessory)</option>
            </select>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Quantity</label>
                    <input type="number" id="itemQuantity" value="1" min="1" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Discount (Optional)</label>
                    <input type="number" id="itemDiscount" value="0.00" min="0" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
        </section>

        <section id="imeiSection" class="bg-white p-5 rounded-xl shadow-xs border border-gray-200">
            <h2 class="text-lg font-bold text-gray-800 mb-1">2. Hardware Tracking</h2>
            <p class="text-xs text-gray-500 mb-3">Required for smartphones to track warranties.</p>
            
            <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Device IMEI / Serial Number</label>
            <input type="text" id="imeiInput" placeholder="e.g. 351234567890123" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </section>

        <section class="bg-white p-5 rounded-xl shadow-xs border border-gray-200">
            <h2 class="text-lg font-bold text-gray-800 mb-3">3. Payment Details</h2>
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Method</label>
                    <select id="paymentMethod" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="Mobile Money">Mobile Money</option>
                        <option value="Cash">Cash</option>
                        <option value="Card">Visa / Mastercard</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Total Expected Price</label>
                    <input type="number" id="paymentAmount" placeholder="Amount to charge" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Reference Number / Txn ID</label>
            <input type="text" id="paymentRef" placeholder="e.g. MOMO-TXNID-8812" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </section>

        <div id="terminalLog" class="bg-black text-green-400 p-4 rounded-xl font-mono text-xs shadow-inner whitespace-pre-line leading-relaxed">
            > POS terminal ready. Awaiting cart placement...
        </div>

    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-xl z-50">
        <div class="max-w-xl mx-auto flex gap-2">
            <a href="products.html" class="bg-gray-100 border border-gray-200 hover:bg-gray-200 text-gray-700 py-4 px-3 rounded-xl font-bold text-xs flex flex-col items-center justify-center shadow-sm min-w-[65px]">
                <span>📦</span><span>Stock</span>
            </a>
            <a href="sales.html" class="bg-gray-100 border border-gray-200 hover:bg-gray-200 text-gray-700 py-4 px-3 rounded-xl font-bold text-xs flex flex-col items-center justify-center shadow-sm min-w-[65px]">
                <span>📊</span><span>Sales</span>
            </a>
            <button id="checkoutBtn" class="flex-1 bg-emerald-500 hover:bg-emerald-600 active:scale-98 transition text-white py-4 px-6 rounded-xl font-bold text-lg shadow-md tracking-wide cursor-pointer">
                🛒 Checkout
            </button>
        </div>
    </footer>

    <script>
        // SESSION GUARD: Kick unauthenticated users back to the lock screen instantly
        if (!localStorage.getItem('active_staff_id')) {
            window.location.href = 'login.html';
        }

        // Supabase Live Client Connection Core Configurations
        const SUPABASE_URL = 'https://ezdpxjjzemtxbmjyjmfi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6ZHB4amp6ZW10eGJtanlqbWZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NzY5NDYsImV4cCI6MjA5NzM1Mjk0Nn0.ADcwJuefJxBC2h4iQHsTZ_Nixmlql_cGgGTIucxxgDw';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // DOM elements
        const productSelect = document.getElementById('productSelect');
        const imeiSection = document.getElementById('imeiSection');
        const checkoutBtn = document.getElementById('checkoutBtn');
        const logTerminal = document.getElementById('terminalLog');

        // Render active logged-in user profile badge dynamically
        document.getElementById('cashierBadge').textContent = localStorage.getItem('active_staff_name') || 'Admin';

        // Toggle IMEI box view depending on whether item selected is a smartphone
        productSelect.addEventListener('change', () => {
            const selectedOption = productSelect.options[productSelect.selectedIndex];
            const isSerialized = selectedOption.getAttribute('data-serialized') === 'true';
            imeiSection.style.display = isSerialized ? 'block' : 'none';
        });

        function addLog(message, isFailure = false) {
            const trackingColor = isFailure ? 'text-red-400' : 'text-green-400';
            logTerminal.innerHTML += `<br><span class="${trackingColor}">> ${message}</span>`;
            window.scrollTo(0, document.body.scrollHeight);
        }

        // Primary Checkout Processor Function Engine Event Call
        checkoutBtn.addEventListener('click', async () => {
            checkoutBtn.disabled = true;
            addLog("Reading configuration parameters...");

            const productId = parseInt(productSelect.value);
            const quantity = parseInt(document.getElementById('itemQuantity').value);
            const discount = parseFloat(document.getElementById('itemDiscount').value) || 0;
            const imeiVal = document.getElementById('imeiInput').value.trim();
            
            const selectedOption = productSelect.options[productSelect.selectedIndex];
            const isSerialized = selectedOption.getAttribute('data-serialized') === 'true';

            // Build array logic parsing structures
            const imeisArray = (isSerialized && imeiVal) ? [imeiVal] : [];
            
            const cartPayload = [{
                product_id: productId,
                quantity: quantity,
                imeis: imeisArray,
                discount: discount
            }];

            const payMethod = document.getElementById('paymentMethod').value;
            const payAmount = parseFloat(document.getElementById('paymentAmount').value) || 0;
            const payRef = document.getElementById('paymentRef').value.trim();

            const paymentsPayload = [{
                method: payMethod,
                amount: payAmount,
                ref: payRef || null
            }];

            try {
                addLog(`Opening gateway to pipeline engine...`);
                
                // RPC request fires transaction processing routine automatically
                const { data: generatedSaleId, error } = await supabaseClient.rpc('process_complete_sale', {
                    cart: cartPayload,
                    payments_list: paymentsPayload,
                    current_staff_id: parseInt(localStorage.getItem('active_staff_id')) || 1, 
                    current_shift_id: null,
                    current_customer_id: null
                });

                if (error) throw new Error(error.message);

                addLog(`💵 Success! Sale records saved seamlessly.`);
                addLog(`📄 Invoice Generated: #INV-${generatedSaleId}`);
                addLog(`📦 Stock records updated in system profiles.`);
                addLog(`🔀 Launching receipt router engine...`);

                // Force the browser to open the beautiful receipt view automatically after 1.5 seconds
                setTimeout(() => { 
                    window.location.href = `receipt.html?id=${generatedSaleId}`; 
                }, 1500);

            } catch(err) {
                addLog(`Transaction processing execution halted!`, true);
                addLog(`Error Context: ${err.message}`, true);
            } finally {
                checkoutBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
