<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Righteous POS - Terminal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased min-h-screen pb-28">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-xl">📱</span>
                <h1 class="text-xl font-bold tracking-wide">Righteous POS</h1>
            </div>
            <span class="bg-blue-700 text-[10px] px-2.5 py-1 rounded-full font-mono uppercase tracking-wider">System Admin (Admin)</span>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-4">

        <div class="bg-white p-5 rounded-xl shadow-xs border border-gray-200 space-y-4">
            <h2 class="text-base font-bold text-gray-800 flex items-center gap-1.5">
                <span class="text-blue-600 font-mono">1.</span> Select Product
            </h2>
            
            <div>
                <label class="block text-[10px] font-bold uppercase text-gray-400 mb-1 tracking-wide">Product Item</label>
                <select id="productSelect" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium text-sm">
                    <option value="">Loading live inventory goods...</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-gray-400 mb-1 tracking-wide">Quantity</label>
                    <input type="number" id="quantityInput" value="1" min="1" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-semibold text-sm">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-gray-400 mb-1 tracking-wide">Discount (Optional)</label>
                    <input type="number" id="discountInput" value="0.00" min="0" step="0.01" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-semibold text-sm">
                </div>
            </div>
        </div>

        <div class="bg-white p-5 rounded-xl shadow-xs border border-gray-200 space-y-4">
            <h2 class="text-base font-bold text-gray-800 flex items-center gap-1.5">
                <span class="text-blue-600 font-mono">2.</span> Payment Details
            </h2>
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-gray-400 mb-1 tracking-wide">Method</label>
                    <select id="paymentMethod" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium text-sm">
                        <option value="Mobile Money">Mobile Money</option>
                        <option value="Cash">Cash</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-gray-400 mb-1 tracking-wide">Total Expected Price</label>
                    <div id="totalDisplay" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg font-black text-gray-800 text-base flex items-center">
                        GHS 0.00
                    </div>
                </div>
            </div>
        </div>

    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-xl z-40">
        <div class="max-w-xl mx-auto flex gap-3 items-center">
            
            <a href="products.html" class="flex flex-col items-center justify-center border border-gray-200 rounded-xl p-2 text-gray-600 min-w-[64px] hover:bg-gray-50 transition active:scale-95">
                <span class="text-lg">📦</span>
                <span class="text-[10px] font-bold mt-0.5">Stock</span>
            </a>

            <a href="sales.html" class="flex flex-col items-center justify-center border border-gray-200 rounded-xl p-2 text-gray-600 min-w-[64px] hover:bg-gray-50 transition active:scale-95">
                <span class="text-lg">📊</span>
                <span class="text-[10px] font-bold mt-0.5">Sales</span>
            </a>

            <button id="checkoutBtn" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-6 rounded-xl shadow-md transition active:scale-98 flex items-center justify-center gap-2 cursor-pointer text-sm tracking-wide">
                🛒 Checkout
            </button>

        </div>
    </footer>

    <script>
        // SESSION GUARD: Protect routing terminals
        if (!localStorage.getItem('active_staff_id')) {
            window.location.href = 'login.html';
        }

        const SUPABASE_URL = 'https://ezdpxjjzemtxbmjyjmfi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6ZHB4amp6ZW10eGJtanlqbWZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NzY5NDYsImV4cCI6MjA5NzM1Mjk0Nn0.ADcwJuefJxBC2h4iQHsTZ_Nixmlql_cGgGTIucxxgDw';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const prodSelect = document.getElementById('productSelect');
        const qtyInput = document.getElementById('quantityInput');
        const discInput = document.getElementById('discountInput');
        const totalDisplay = document.getElementById('totalDisplay');
        const checkoutBtn = document.getElementById('checkoutBtn');

        let catalogCache = [];

        // Load active retail warehouse inventory products array
        async function loadTerminalCatalog() {
            try {
                const { data: products, error } = await supabaseClient
                    .from('products')
                    .select('*')
                    .order('name');

                if (error) throw error;
                catalogCache = products;

                prodSelect.innerHTML = '<option value="">-- Choose Product --</option>' +
                    products.map(p => `<option value="${p.id}">${p.brand} ${p.name} (GHS ${parseFloat(p.selling_price).toFixed(2)})</option>`).join('');

            } catch (err) {
                alert(`Ecosystem Error: ${err.message}`);
            }
        }

        // Calculate pricing parameters live automatically
        function recalculateTicketPricing() {
            const matchedItem = catalogCache.find(p => p.id == prodSelect.value);
            if (!matchedItem) {
                totalDisplay.textContent = "GHS 0.00";
                return;
            }
            const qty = parseInt(qtyInput.value) || 1;
            const discount = parseFloat(discInput.value) || 0;
            const absoluteTotal = (matchedItem.selling_price * qty) - discount;
            totalDisplay.textContent = `GHS ${Math.max(0, absoluteTotal).toFixed(2)}`;
        }

        prodSelect.addEventListener('change', recalculateTicketPricing);
        qtyInput.addEventListener('input', recalculateTicketPricing);
        discInput.addEventListener('input', recalculateTicketPricing);

        // CHECKOUT LOGIC: Automated zero-typing pipeline execution engine
        checkoutBtn.addEventListener('click', async () => {
            const targetId = prodSelect.value;
            const qty = parseInt(qtyInput.value) || 0;
            const discount = parseFloat(discInput.value) || 0;
            const method = document.getElementById('paymentMethod').value;

            if (!targetId || qty <= 0) return alert("Please specify a valid product item and quantity.");

            const matchedItem = catalogCache.find(p => p.id == targetId);
            if (!matchedItem) return;

            checkoutBtn.disabled = true;
            checkoutBtn.textContent = "Processing Transaction...";

            try {
                let itemsToProcess = [];

                if (matchedItem.is_serialized) {
                    // AUTOMATION STAGE: Find the oldest available IMEIs corresponding to this product
                    const { data: availableImeis, error: fetchError } = await supabaseClient
                        .from('serialized_items')
                        .select('id, imei_or_serial')
                        .eq('product_id', targetId)
                        .eq('status', 'Available')
                        .order('created_at', { ascending: true })
                        .limit(qty);

                    if (fetchError) throw fetchError;
                    if (!availableImeis || availableImeis.length < qty) {
                        throw new Error(`Out of stock! This phone only has ${availableImeis ? availableImeis.length : 0} tracking IMEI(s) remaining in the system.`);
                    }

                    // Extract database row IDs to flag them down as sold
                    const imeiIdsToUpdate = availableImeis.map(item => item.id);
                    
                    const { error: patchError } = await supabaseClient
                        .from('serialized_items')
                        .update({ status: 'Sold' })
                        .in('id', imeiIdsToUpdate);

                    if (patchError) throw patchError;
                    
                    // Cache string representations of the auto-assigned serial lines
                    itemsToProcess = availableImeis.map(item => item.imei_or_serial);

                } else {
                    // Bulk accessory inventory deduction loop
                    if (matchedItem.bulk_stock_quantity < qty) {
                        throw new Error(`Insufficient stock levels! Only ${matchedItem.bulk_stock_quantity} units left.`);
                    }

                    const newBulkQty = matchedItem.bulk_stock_quantity - qty;
                    const { error: bulkError } = await supabaseClient
                        .from('products')
                        .update({ bulk_stock_quantity: newBulkQty })
                        .eq('id', targetId);

                    if (bulkError) throw bulkError;
                    matchedItem.bulk_stock_quantity = newBulkQty;
                }

                // Compile fiscal pricing margins metrics
                const netAmount = (matchedItem.selling_price * qty) - discount;
                const totalCostBasis = matchedItem.cost_price * qty;
                const profitGenerated = netAmount - totalCostBasis;
                const generatedInvoiceRef = `INV-${Math.floor(100000 + Math.random() * 900000)}`;

                // Insert structural record entry logs into master database analytics tables
                const { data: newSaleRecord, error: saleError } = await supabaseClient
                    .from('sales')
                    .insert([{
                        invoice_number: generatedInvoiceRef,
                        net_amount: netAmount,
                        profit_generated: profitGenerated,
                        payment_method: method,
                        staff_id: parseInt(localStorage.getItem('active_staff_id'))
                    }])
                    .select()
                    .single();

                if (saleError) throw saleError;

                // Push workflow navigation views down to receipt viewport directly
                window.location.href = `receipt.html?id=${newSaleRecord.id}`;

            } catch (err) {
                alert(`Checkout Interrupted: ${err.message}`);
                checkoutBtn.disabled = false;
                checkoutBtn.textContent = "🛒 Checkout";
            }
        });

        window.addEventListener('DOMContentLoaded', loadTerminalCatalog);
    </script>
</body>
</html>
