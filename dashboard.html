<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Righteous POS - Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    
    @media print {
      body * { visibility: hidden; }
      #receipt-modal, #receipt-modal * { visibility: visible; }
      #receipt-modal { position: absolute; left: 0; top: 0; width: 100%; max-width: 80mm; background: white; color: black; padding: 0; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col font-sans antialiased">

  <div class="bg-gray-900 p-4 flex flex-col md:flex-row justify-between items-center gap-3 shadow-md sticky top-0 z-40">
    <div class="text-center md:text-left">
      <span class="text-lg md:text-xl text-amber-400 font-bold tracking-tight">Righteous Phones & Accessories</span>
    </div>
    <div class="flex flex-wrap justify-center gap-4 text-xs md:text-sm font-medium text-gray-300 items-center">
      <a href="dashboard.html" class="text-amber-400 border-b-2 border-amber-400 pb-1">Checkout</a>
      <a href="products.html" class="hover:text-amber-400 transition">Inventory Manager</a>
      <a href="sales.html" class="hover:text-amber-400 transition">Sales Logs</a>
      <span class="text-gray-600 hidden sm:inline">|</span>
      <a href="#" onclick="triggerLogout(event)" class="text-rose-400 hover:text-rose-500 transition font-bold">Log Out</a>
    </div>
  </div>

  <div class="flex flex-col md:flex-row flex-1 h-auto md:h-[calc(100vh-62px)] overflow-y-auto md:overflow-hidden">
    
    <div class="w-full md:w-2/3 p-4 md:p-6 flex flex-col h-auto md:h-full border-b md:border-b-0 md:border-r border-gray-200">
      <div class="mb-4 flex flex-col sm:flex-row gap-3">
        <input 
          type="text" 
          id="search-input"
          placeholder="Search by device name, accessory or brand..." 
          class="flex-1 p-3 bg-white border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm"
        />
        <select 
          id="category-filter"
          class="p-3 bg-white border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-amber-500 text-sm text-gray-600"
        >
          <option value="ALL">All Categories</option>
          <option value="Smartphone">Smartphones</option>
          <option value="Accessories">Accessories</option>
          <option value="Tablet">Tablets</option>
        </select>
      </div>

      <div id="loading-state" class="text-center py-12 text-gray-500 font-medium">
        Syncing live data registry...
      </div>

      <div id="catalog-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-3 md:gap-4 overflow-y-auto flex-1 pr-1 custom-scrollbar hidden"></div>
    </div>

    <div class="w-full md:w-1/3 bg-white shadow-2xl p-4 md:p-6 flex flex-col h-auto md:h-full justify-between sticky bottom-0 md:relative border-t md:border-t-0">
      <div>
        <div class="border-b pb-3 mb-4 flex justify-between items-center">
          <h2 class="text-base md:text-lg font-bold text-gray-800">Current Basket</h2>
          <button onclick="clearCart()" class="text-xs font-semibold text-rose-500 hover:underline">Clear All</button>
        </div>
        
        <div id="cart-container" class="space-y-3 overflow-y-auto max-h-[25vh] md:max-h-[45vh] pr-1 custom-scrollbar">
          <p id="empty-cart-msg" class="text-gray-400 text-center py-8 text-sm">Basket empty. Tap items to add.</p>
        </div>
      </div>

      <div class="border-t pt-4 space-y-4 bg-white mt-4">
        <div>
          <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wide mb-2">Payment Channel</label>
          <div class="grid grid-cols-3 gap-2">
            <button onclick="setPaymentMethod('Cash')" id="btn-Cash" class="pay-btn p-2 text-xs font-bold border rounded-xl transition bg-gray-900 text-white border-gray-900">Cash</button>
            <button onclick="setPaymentMethod('Mobile Money')" id="btn-Mobile Money" class="pay-btn p-2 text-xs font-bold border rounded-xl transition bg-white text-gray-700 hover:bg-gray-50">MoMo</button>
            <button onclick="setPaymentMethod('Card')" id="btn-Card" class="pay-btn p-2 text-xs font-bold border rounded-xl transition bg-white text-gray-700 hover:bg-gray-50">Card</button>
          </div>
        </div>

        <div class="bg-gray-50 p-3 md:p-4 rounded-xl border border-gray-100 space-y-1.5">
          <div class="flex justify-between text-xs text-gray-500 font-medium">
            <span>Subtotal Value:</span> <span id="subtotal-val">$0.00</span>
          </div>
          <div class="flex justify-between items-baseline pt-1 border-t border-dashed border-gray-200">
            <span class="text-xs md:text-sm font-bold text-gray-700">Total Due:</span>
            <span id="total-val" class="text-xl md:text-2xl font-black text-emerald-600">$0.00</span>
          </div>
        </div>

        <button 
          id="checkout-submit-btn" 
          onclick="submitTransaction()" 
          disabled 
          class="w-full py-3.5 text-center rounded-xl font-bold text-white shadow-lg transition bg-gray-300 cursor-not-allowed text-xs md:text-sm tracking-wide uppercase"
        >
          Complete Processing
        </button>
      </div>
    </div>
  </div>

  <div id="receipt-modal-backdrop" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden no-print">
    <div class="bg-white rounded-2xl max-w-sm w-full p-5 shadow-2xl flex flex-col max-h-[90vh]">
      <div id="receipt-modal" class="overflow-y-auto flex-1 font-mono text-xs text-gray-800 p-2 border border-gray-100 rounded-lg custom-scrollbar"></div>
      <div class="mt-4 grid grid-cols-2 gap-3 no-print">
        <button onclick="window.print()" class="py-2.5 bg-gray-900 text-white font-bold rounded-xl text-xs uppercase hover:bg-gray-800 tracking-wider">Print Slip</button>
        <button onclick="closeReceiptModal()" class="py-2.5 bg-gray-200 text-gray-700 font-bold rounded-xl text-xs uppercase hover:bg-gray-300 tracking-wider">Dismiss</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ezdpxjjzemtxbmjyjmfi.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ddxoPTFqgbR2pNgQBzY_aA_OeldolSz';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function checkAuth() {
      const { data: { session } } = await _supabase.auth.getSession();
      if (!session) window.location.href = 'login.html';
      else pullFreshInventory();
    }
    checkAuth();

    let localInventory = [];
    let transactionCart = [];
    let selectedPayment = 'Cash';

    async function pullFreshInventory() {
      document.getElementById('loading-state').classList.remove('hidden');
      document.getElementById('catalog-grid').classList.add('hidden');

      const { data, error } = await _supabase.from('products').select('*');
      if (error) { alert("Database connection issue: " + error.message); return; }

      localInventory = data || [];
      localInventory.sort((a, b) => (a.title || '').toLowerCase().localeCompare((b.title || '').toLowerCase()));

      renderCatalog();
      document.getElementById('loading-state').classList.add('hidden');
      document.getElementById('catalog-grid').classList.remove('hidden');
    }

    function renderCatalog() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const catFilter = document.getElementById('category-filter').value;
      const grid = document.getElementById('catalog-grid');

      const filtered = localInventory.filter(item => {
        const itemTitle = item.title || '';
        const matchesSearch = itemTitle.toLowerCase().includes(search) || (item.brand || '').toLowerCase().includes(search);
        const matchesCat = catFilter === 'ALL' || item.category === catFilter;
        return matchesSearch && matchesCat;
      });

      grid.innerHTML = filtered.map(prod => {
        const stockAvailable = Number(prod.quantity) || 0;
        const outOfStock = stockAvailable <= 0;
        return `
          <button onclick="addItemToCart('${prod.id}')" ${outOfStock ? 'disabled' : ''} class="p-3 bg-white border border-gray-200 rounded-xl shadow-sm text-left flex flex-col justify-between transition hover:border-amber-500 min-h-[120px] ${outOfStock ? 'opacity-40 cursor-not-allowed' : ''}">
            <div>
              <div class="flex gap-1 flex-wrap">
                <span class="text-[8px] font-bold text-amber-600 bg-amber-50 px-1 py-0.5 rounded uppercase tracking-wider">${prod.brand || 'Generic'}</span>
                <span class="text-[8px] font-bold text-gray-400 bg-gray-100 px-1 py-0.5 rounded uppercase tracking-wider">${prod.category || 'Stock'}</span>
              </div>
              <h3 class="font-bold text-gray-800 mt-1 text-xs line-clamp-2">${prod.title || 'Item Line'}</h3>
            </div>
            <div class="mt-2 flex justify-between items-baseline w-full border-t pt-1.5 border-gray-50">
              <span class="text-[10px] text-gray-400">Qty: ${stockAvailable}</span>
              <span class="text-sm font-black text-emerald-600">$${Number(prod.retail_price).toFixed(2)}</span>
            </div>
          </button>
        `;
      }).join('');
    }

    function addItemToCart(id) {
      const targetId = String(id).trim();
      const product = localInventory.find(p => String(p.id).trim() === targetId);
      if (!product) return;

      const stockAvailable = Number(product.quantity) || 0;
      if (stockAvailable <= 0) return;

      const existingCartItem = transactionCart.find(item => String(item.id).trim() === targetId);

      if (existingCartItem) {
        if (existingCartItem.basketQuantity >= stockAvailable) {
          alert(`Floor ceiling reached. Only ${stockAvailable} items available.`);
          return;
        }
        existingCartItem.basketQuantity += 1;
      } else {
        transactionCart.push({
          id: product.id,
          title: product.title || 'Item Line',
          retail_price: Number(product.retail_price) || 0,
          basketQuantity: 1
        });
      }
      syncCartInterface();
    }

    function updateCartQuantity(id, change) {
      const targetId = String(id).trim();
      const cartItem = transactionCart.find(item => String(item.id).trim() === targetId);
      if (!cartItem) return;

      const product = localInventory.find(p => String(p.id).trim() === targetId);
      const stockAvailable = product ? (Number(product.quantity) || 0) : 0;

      const newQty = cartItem.basketQuantity + change;

      if (newQty > stockAvailable) {
        alert(`Cannot exceed available stock.`);
        cartItem.basketQuantity = stockAvailable;
      } else if (newQty <= 0) {
        transactionCart = transactionCart.filter(item => String(item.id).trim() !== targetId);
      } else {
        cartItem.basketQuantity = newQty;
      }
      syncCartInterface();
    }

    function clearCart() { transactionCart = []; syncCartInterface(); }

    function syncCartInterface() {
      const container = document.getElementById('cart-container');
      const submitBtn = document.getElementById('checkout-submit-btn');

      if (transactionCart.length === 0) {
        container.innerHTML = '<p id="empty-cart-msg" class="text-gray-400 text-center py-8 text-sm">Basket empty. Tap items to add.</p>';
        submitBtn.disabled = true;
        submitBtn.className = "w-full py-4 text-center rounded-xl font-bold text-white bg-gray-300 cursor-not-allowed text-sm uppercase";
        document.getElementById('subtotal-val').innerText = "$0.00";
        document.getElementById('total-val').innerText = "$0.00";
        return;
      }

      let grandTotal = 0;
      container.innerHTML = transactionCart.map(item => {
        const itemTotal = item.retail_price * item.basketQuantity;
        grandTotal += itemTotal;
        return `
          <div class="flex justify-between items-center bg-gray-50 border border-gray-100 p-2.5 rounded-xl">
            <div class="flex-1 min-w-0 pr-2">
              <h4 class="font-bold text-gray-800 text-xs truncate">${item.title}</h4>
              <p class="text-[10px] text-gray-400 mt-0.5">$${item.retail_price.toFixed(2)} each</p>
            </div>
            <div class="flex items-center gap-2">
              <div class="flex items-center border border-gray-200 bg-white rounded-lg overflow-hidden">
                <button onclick="updateCartQuantity('${item.id}', -1)" class="px-2 py-0.5 bg-gray-50 text-gray-500 hover:bg-gray-100 font-bold text-xs">-</button>
                <span class="px-1.5 text-xs font-bold text-gray-800">${item.basketQuantity}</span>
                <button onclick="updateCartQuantity('${item.id}', 1)" class="px-2 py-0.5 bg-gray-50 text-gray-500 hover:bg-gray-100 font-bold text-xs">+</button>
              </div>
              <span class="font-bold text-xs text-gray-700 w-14 text-right">$${itemTotal.toFixed(2)}</span>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('subtotal-val').innerText = `$${grandTotal.toFixed(2)}`;
      document.getElementById('total-val').innerText = `$${grandTotal.toFixed(2)}`;
      submitBtn.disabled = false;
      submitBtn.className = "w-full py-4 text-center rounded-xl font-bold text-white bg-emerald-600 hover:bg-emerald-700 shadow-md transition text-sm uppercase cursor-pointer";
    }

    function setPaymentMethod(method) {
      selectedPayment = method;
      document.querySelectorAll('.pay-btn').forEach(btn => {
        btn.className = "pay-btn p-2 text-xs font-bold border rounded-xl transition bg-white text-gray-700 hover:bg-gray-50";
      });
      document.getElementById(`btn-${method}`).className = "pay-btn p-2 text-xs font-bold border rounded-xl transition bg-gray-900 text-white border-gray-900";
    }

    async function submitTransaction() {
      if (transactionCart.length === 0) return;
      const submitBtn = document.getElementById('checkout-submit-btn');
      submitBtn.disabled = true; 
      submitBtn.innerText = "Processing...";

      const totalValue = transactionCart.reduce((sum, item) => sum + (item.retail_price * item.basketQuantity), 0);

      try {
        // 1. Insert Master Record into sales table
        const { data: saleData, error: saleError } = await _supabase
          .from('sales')
          .insert([{ total_amount: totalValue, payment_method: selectedPayment }])
          .select('id')
          .single();

        if (saleError) throw saleError;
        const insertedSaleId = saleData.id;

        // 2. Loop through and execute updates sequentially
        for (const record of transactionCart) {
          // Write to pre-cached structure, skipping the non-cached price field entirely
          const { error: itemError } = await _supabase
            .from('sale_items')
            .insert([{
              sale_id: insertedSaleId,
              product_id: record.id,
              quantity: record.basketQuantity
            }]);

          if (itemError) throw itemError;

          // Deduct current stock levels
          const masterProduct = localInventory.find(p => p.id === record.id);
          const legacyStock = masterProduct ? (Number(masterProduct.quantity) || 0) : 0;
          
          await _supabase
            .from('products')
            .update({ quantity: Math.max(0, legacyStock - record.basketQuantity) })
            .eq('id', record.id);
        }

        renderThermalReceipt(insertedSaleId, totalValue);
        clearCart();
        await pullFreshInventory(); 
      } catch (err) {
        alert("Transaction Failed: " + err.message);
      } finally {
        submitBtn.innerText = "Complete Processing";
      }
    }

    function renderThermalReceipt(invoiceId, totalValue) {
      const timeStr = new Date().toLocaleString();
      let itemsLinesHtml = '';
      
      transactionCart.forEach(item => {
        const rowTotal = item.retail_price * item.basketQuantity;
        itemsLinesHtml += `
          <div class="flex justify-between my-1">
            <span>${item.basketQuantity}x ${item.title.substring(0, 18)}</span>
            <span>$${rowTotal.toFixed(2)}</span>
          </div>
        `;
      });

      const modalContent = `
        <div class="text-center border-b border-dashed pb-3 mb-3">
          <h2 class="text-sm font-black uppercase tracking-wider">Righteous Phones & Accessories</h2>
          <p class="text-[10px] text-gray-500 mt-0.5">Device & Retail Specialists</p>
          <p class="text-[9px] text-gray-400 mt-2">Inv ID: #${invoiceId}</p>
          <p class="text-[9px] text-gray-400">${timeStr}</p>
        </div>
        <div class="border-b border-dashed pb-3 mb-3 text-[11px]">
          ${itemsLinesHtml}
        </div>
        <div class="space-y-1 text-xs font-bold mb-4">
          <div class="flex justify-between">
            <span>Payment:</span>
            <span class="uppercase">${selectedPayment}</span>
          </div>
          <div class="flex justify-between text-sm font-black pt-1 border-t border-double">
            <span>TOTAL AMOUNT:</span>
            <span>$${totalValue.toFixed(2)}</span>
          </div>
        </div>
        <div class="text-center pt-2 border-t border-dashed text-[10px] text-gray-500">
          <p>Thank you for shopping with us!</p>
          <p class="mt-1 font-sans font-semibold text-[8px]">Powered by Righteous POS</p>
        </div>
      `;

      document.getElementById('receipt-modal').innerHTML = modalContent;
      document.getElementById('receipt-modal-backdrop').classList.remove('hidden');
    }

    function closeReceiptModal() {
      document.getElementById('receipt-modal-backdrop').classList.add('hidden');
    }

    async function triggerLogout(e) {
      e.preventDefault();
      if (confirm("Log out?")) { await _supabase.auth.signOut(); window.location.href = 'login.html'; }
    }

    document.getElementById('search-input').addEventListener('input', renderCatalog);
    document.getElementById('category-filter').addEventListener('change', renderCatalog);
  </script>
</body>
</html>
