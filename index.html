<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Righteous POS - Routing...</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">

  <div class="text-center">
    <div class="w-12 h-12 border-4 border-amber-400 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
    <p class="text-gray-400 text-xs font-bold uppercase tracking-widest animate-pulse">Verifying Session...</p>
  </div>

  <script>
    const SUPABASE_URL = 'https://ezdpxjjzemtxbmjyjmfi.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ddxoPTFqgbR2pNgQBzY_aA_OeldolSz';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function routeTraffic() {
      try {
        const { data: { session }, error } = await _supabase.auth.getSession();
        
        if (session && !error) {
          // Valid active token found -> head straight to checkout
          window.location.href = 'dashboard.html';
        } else {
          // No active token -> require authentication gateway
          window.location.href = 'login.html';
        }
      } catch (err) {
        // Fallback safety valve if network or initialization fails
        window.location.href = 'login.html';
      }
    }

    // Initialize routing engine immediately
    routeTraffic();
  </script>
</body>
</html>
