<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Righteous Phones & Accessories - POS</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @media print {
            body * { visibility: hidden; }
            #receipt-print-area, #receipt-print-area * { visibility: visible; }
            #receipt-print-area { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

    <header class="bg-blue-600 text-white shadow-md p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <i data-lucide="smartphone" class="w-6 h-6"></i>
            <h1 class="text-xl font-bold tracking-tight">Righteous Phones & Accessories</h1>
        </div>
        <nav class="flex space-x-2">
            <button onclick="switchTab('sales')" id="tab-sales" class="px-4 py-2 rounded bg-blue-700 font-medium transition">Sales</button>
            <button onclick="switchTab('inventory')" id="tab-inventory" class="px-4 py-2 rounded hover:bg-blue-500 font-medium transition">Inventory</button>
        </nav>
    </header>

    <main class="flex-1 flex flex-col md:flex-row p-4 gap-4 overflow-hidden h-[calc(100vh-70px)]">
        
        <div id="view-sales" class="flex-1 flex flex-col md:flex-row gap-4 w-full">
            <div class="flex-1 bg-white rounded-xl shadow p-4 flex flex-col h-full">
                <div class="mb-4 space-y-3">
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3 top-3 text-gray-400 w-5 h-5"></i>
                        <input type="text" id="search-input" oninput="filterCatalog()" placeholder="Search products by name, IMEI, or supplier..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="flex space-x-2 overflow-x-auto pb-1" id="category-filters">
                        <button onclick="filterCategory('All')" class="cat-btn px-4 py-1.5 rounded-full text-sm bg-blue-600 text-white font-medium">All</button>
                        <button onclick="filterCategory('Phones')" class="cat-btn px-4 py-1.5 rounded-full text-sm bg-gray-200 text-gray-700 hover:bg-gray-300 font-medium">Phones</button>
                        <button onclick="filterCategory('Accessories')" class="cat-btn px-4 py-1.5 rounded-full text-sm bg-gray-200 text-gray-700 hover:bg-gray-300 font-medium">Accessories</button>
                        <button onclick="filterCategory('Others')" class="cat-btn px-4 py-1.5 rounded-full text-sm bg-gray-200 text-gray-700 hover:bg-gray-300 font-medium">Others</button>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto pr-1">
                    <div id="sales-catalog-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
                        </div>
                </div>
            </div>

            <div class="w-full md:w-96 bg-white rounded-xl shadow p-4 flex flex-col h-full">
                <h2 class="text-lg font-bold border-b pb-2 mb-3 flex items-center justify-between">
                    <span>Current Order</span>
                    <span id="cart-count" class="bg-blue-100 text-blue-800 text-xs px-2.5 py-0.5 rounded-full font-semibold">0 items</span>
                </h2>
                
                <div id="cart-items-list" class="flex-1 overflow-y-auto space-y-3 pr-1 mb-4">
                    <div class="text-center text-gray-400 py-8 flex flex-col items-center justify-center space-y-2">
                        <i data-lucide="shopping-cart" class="w-8 h-8 text-gray-300"></i>
                        <p class="text-sm">Cart is currently empty</p>
                    </div>
                </div>

                <div class="border-t pt-3 space-y-3">
                    <div class="flex justify-between items-center text-xl font-bold text-gray-800">
                        <span>Total:</span>
                        <span id="cart-total-display">GH₵ 0.00</span>
                    </div>
                    <button onclick="processCheckout()" id="checkout-btn" disabled class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-xl shadow disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center space-x-2 transition">
                        <i data-lucide="badge-check" class="w-5 h-5"></i>
                        <span>Complete Order & Print</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="view-inventory" class="hidden flex-1 bg-white rounded-xl shadow p-4 flex flex-col h-full w-full">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <div>
                    <h2 class="text-xl font-bold text-gray-800">Master Stock Registry</h2>
                    <p class="text-sm text-gray-500">Add products or manage existing quantities</p>
                </div>
                <button onclick="openProductModal()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg flex items-center space-x-1.5 transition">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i>
                    <span>Add New Item</span>
                </button>
            </div>

            <div class="flex-1 overflow-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200 text-gray-600 text-xs tracking-wider uppercase font-semibold">
                            <th class="p-3">Item Details</th>
                            <th class="p-3">Category</th>
                            <th class="p-3">Supplier</th>
                            <th class="p-3 text-right">Cost Price</th>
                            <th class="p-3 text-right">Retail Price</th>
                            <th class="p-3 text-center">Stock Level</th>
                            <th class="p-3 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-table-body" class="divide-y divide-gray-100 text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="product-modal" class="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center hidden opacity-0 transition-opacity duration-200">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md m-4 overflow-hidden transform scale-95 transition-transform duration-200">
            <div class="bg-gray-900 text-white p-4 flex justify-between items-center">
                <h3 id="modal-title" class="font-bold text-lg">Add New Stock Entry</h3>
                <button onclick="closeProductModal()" class="text-gray-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <form id="product-form" onsubmit="saveProduct(event)" class="p-4 space-y-4">
                <input type="hidden" id="form-product-id">
                
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Product Name *</label>
                    <input type="text" id="form-name" required class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Category</label>
                        <select id="form-category" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="Phones">Phones</option>
                            <option value="Accessories">Accessories</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Initial Stock Level *</label>
                        <input type="number" id="form-quantity" required min="0" value="1" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Cost Price (GH₵)</label>
                        <input type="number" id="form-cost-price" step="0.01" min="0" value="0.00" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Selling Price (GH₵) *</label>
                        <input type="number" id="form-price" required step="0.01" min="0" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">IMEI / Serial Number</label>
                    <input type="text" id="form-imei" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Optional tracking ID">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase text-gray-500 mb-1">Supplier Source</label>
                    <input type="text" id="form-supplier" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g., China Supplier, Local Wholesaler">
                </div>

                <div class="pt-2 border-t flex justify-end space-x-2">
                    <button type="button" onclick="closeProductModal()" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded">Cancel</button>
                    <button type="submit" id="save-btn" class="px-4 py-2 text-sm font-bold bg-blue-600 hover:bg-blue-700 text-white rounded shadow flex items-center space-x-1">
                        <i data-lucide="save" class="w-4 h-4"></i>
                        <span>Save Record</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <iframe id="print-buffer-iframe" class="hidden w-0 h-0 absolute border-none"></iframe>

    <script>
        // Place your unique project credentials here
        const SUPABASE_URL = "https://your-project-id.supabase.co"; 
        const SUPABASE_KEY = "your-anon-role-public-key"; 
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Core Reactive App State
        let products = [];
        let cart = [];
        let currentCategoryFilter = "All";
        let currentSearchQuery = "";

        // Application Boots Trap Initialization
        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            syncData();
        });

        // Smart Adaptive Syncing Engine
        async function syncData() {
            try {
                const { data, error } = await supabase.from('products').select('*').order('name', { ascending: true });
                if (error) throw error;
                
                // DEFENSIVE NORMALIZATION LAYER
                // This auto-maps variances in schema configurations to stabilize frontend execution loops
                products = (data || []).map(p => {
                    return {
                        ...p,
                        // Resolves Quantity column deviations safely
                        quantity: p.quantity ?? p.stock ?? p.qty ?? p.product_qty ?? 0,
                        // Resolves Cost Price schema column deviations safely
                        cost_price: p.cost_price ?? p.costPrice ?? p.unit_cost ?? p.buying_price ?? 0
                    };
                });

                renderSalesCatalog();
                renderMasterInventory();
            } catch (err) {
                console.error("Critical System Interruption During Catalog Synchronization:", err.message);
                alert("Database Connectivity Error: " + err.message);
            }
        }

        // Structural UI Navigation Router
        function switchTab(targetTab) {
            const salesView = document.getElementById('view-sales');
            const inventoryView = document.getElementById('view-inventory');
            const tabSalesBtn = document.getElementById('tab-sales');
            const tabInventoryBtn = document.getElementById('tab-inventory');

            if (targetTab === 'sales') {
                salesView.classList.remove('hidden');
                inventoryView.classList.add('hidden');
                tabSalesBtn.className = "px-4 py-2 rounded bg-blue-700 font-medium text-white transition";
                tabInventoryBtn.className = "px-4 py-2 rounded hover:bg-blue-500 font-medium text-white/80 transition";
            } else {
                salesView.classList.add('hidden');
                inventoryView.classList.remove('hidden');
                tabSalesBtn.className = "px-4 py-2 rounded hover:bg-blue-500 font-medium text-white/80 transition";
                tabInventoryBtn.className = "px-4 py-2 rounded bg-blue-700 font-medium text-white transition";
            }
        }

        // Filtering Controls
        function filterCategory(cat) {
            currentCategoryFilter = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                if(btn.textContent.trim() === cat) {
                    btn.className = "cat-btn px-4 py-1.5 rounded-full text-sm bg-blue-600 text-white font-medium";
                } else {
                    btn.className = "cat-btn px-4 py-1.5 rounded-full text-sm bg-gray-200 text-gray-700 hover:bg-gray-300 font-medium";
                }
            });
            renderSalesCatalog();
        }

        function filterCatalog() {
            currentSearchQuery = document.getElementById('search-input').value.toLowerCase().trim();
            renderSalesCatalog();
        }

        // Render Sales Interface Grid Loop
        function renderSalesCatalog() {
            const grid = document.getElementById('sales-catalog-grid');
            grid.innerHTML = '';

            const filtered = products.filter(p => {
                const matchesCat = (currentCategoryFilter === 'All' || p.category === currentCategoryFilter);
                const matchesSearch = !currentSearchQuery || 
                    (p.name && p.name.toLowerCase().includes(currentSearchQuery)) ||
                    (p.imei_sn && p.imei_sn.toLowerCase().includes(currentSearchQuery)) ||
                    (p.supplier && p.supplier.toLowerCase().includes(currentSearchQuery));
                return matchesCat && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-400 text-sm">No inventory matched your filter configuration.</div>`;
                return;
            }

            filtered.forEach(p => {
                const cartItem = cart.find(item => item.id === p.id);
                const allocatedQty = cartItem ? cartItem.orderQuantity : 0;
                const activeStockRemaining = p.quantity - allocatedQty;
                const isOutOfStock = activeStockRemaining <= 0;

                const card = document.createElement('div');
                card.className = `bg-white border rounded-xl p-3 flex flex-col justify-between shadow-sm cursor-pointer transition select-none ${
                    isOutOfStock 
                    ? 'opacity-40 bg-gray-50 border-gray-200 pointer-events-none' 
                    : 'hover:border-blue-500 hover:shadow-md active:scale-98 border-gray-100'
                }`;
                
                card.onclick = () => { if (!isOutOfStock) appendToCart(p); };

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start gap-1 mb-1">
                            <h4 class="font-bold text-gray-800 leading-tight truncate">${p.name}</h4>
                            <span class="text-xs px-2 py-0.5 rounded bg-gray-100 text-gray-600 shrink-0">${p.category || 'General'}</span>
                        </div>
                        <p class="text-xs text-gray-400 truncate mb-2">${p.imei_sn ? 'SN: ' + p.imei_sn : 'Standard Entry'}</p>
                    </div>
                    <div class="flex justify-between items-center mt-2 border-t pt-2 border-gray-50">
                        <span class="font-extrabold text-blue-600 text-md">GH₵ ${parseFloat(p.price || 0).toFixed(2)}</span>
                        <span class="text-xs font-semibold ${activeStockRemaining <= 3 ? 'text-red-500' : 'text-gray-500'}">
                            Qty: ${activeStockRemaining}
                        </span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Cart Interaction Handler
        function appendToCart(product) {
            const existingCartItem = cart.find(item => item.id === product.id);
            const allocatedQty = existingCartItem ? existingCartItem.orderQuantity : 0;

            if (product.quantity - allocatedQty > 0) {
                if (existingCartItem) {
                    existingCartItem.orderQuantity++;
                } else {
                    cart.push({ ...product, orderQuantity: 1 });
                }
                syncCartState();
                renderSalesCatalog();
            }
        }

        function stepCartQuantity(productId, delta) {
            const index = cart.findIndex(item => item.id === productId);
            if (index !== -1) {
                cart[index].orderQuantity += delta;
                if (cart[index].orderQuantity <= 0) {
                    cart.splice(index, 1);
                } else {
                    const originalProduct = products.find(p => p.id === productId);
                    if (cart[index].orderQuantity > originalProduct.quantity) {
                        cart[index].orderQuantity = originalProduct.quantity;
                        alert("Cannot exceed maximum warehouse stock boundaries.");
                    }
                }
                syncCartState();
                renderSalesCatalog();
            }
        }

        function syncCartState() {
            const container = document.getElementById('cart-items-list');
            const counterLabel = document.getElementById('cart-count');
            const finalTotalLabel = document.getElementById('cart-total-display');
            const processBtn = document.getElementById('checkout-btn');

            container.innerHTML = '';
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-gray-400 py-8 flex flex-col items-center justify-center space-y-2">
                        <i data-lucide="shopping-cart" class="w-8 h-8 text-gray-300"></i>
                        <p class="text-sm">Cart is currently empty</p>
                    </div>`;
                counterLabel.textContent = "0 items";
                finalTotalLabel.textContent = "GH₵ 0.00";
                processBtn.disabled = true;
                lucide.createIcons();
                return;
            }

            let totalAccrued = 0;
            let totalItemsCount = 0;

            cart.forEach(item => {
                const subtotal = item.price * item.orderQuantity;
                totalAccrued += subtotal;
                totalItemsCount += item.orderQuantity;

                const element = document.createElement('div');
                element.className = "flex items-center justify-between border-b pb-3 border-gray-100 last:border-none";
                element.innerHTML = `
                    <div class="flex-1 min-w-0 pr-2">
                        <h5 class="font-bold text-sm text-gray-800 truncate">${item.name}</h5>
                        <p class="text-xs text-blue-600 font-medium">GH₵ ${parseFloat(item.price).toFixed(2)} each</p>
                    </div>
                    <div class="flex items-center space-x-2">
                        <div class="flex items-center border border-gray-300 rounded bg-gray-50">
                            <button onclick="stepCartQuantity('${item.id}', -1)" class="px-2 py-0.5 text-gray-600 font-bold hover:bg-gray-200 select-none">-</button>
                            <span class="px-2 text-xs font-bold text-gray-800 min-w-[20px] text-center">${item.orderQuantity}</span>
                            <button onclick="stepCartQuantity('${item.id}', 1)" class="px-2 py-0.5 text-gray-600 font-bold hover:bg-gray-200 select-none">+</button>
                        </div>
                        <div class="text-right min-w-[70px]">
                            <span class="font-bold text-sm text-gray-900">GH₵ ${subtotal.toFixed(2)}</span>
                        </div>
                    </div>
                `;
                container.appendChild(element);
            });

            counterLabel.textContent = `${totalItemsCount} item${totalItemsCount > 1 ? 's' : ''}`;
            finalTotalLabel.textContent = `GH₵ ${totalAccrued.toFixed(2)}`;
            processBtn.disabled = false;
        }

        // Render Warehouse Management View Table Loops
        function renderMasterInventory() {
            const body = document.getElementById('inventory-table-body');
            body.innerHTML = '';

            if (products.length === 0) {
                body.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-gray-400">No rows synchronized from Supabase cloud registry.</td></tr>`;
                return;
            }

            products.forEach(p => {
                const row = document.createElement('tr');
                row.className = "hover:bg-gray-50 transition border-b border-gray-100 last:border-none";
                row.innerHTML = `
                    <td class="p-3">
                        <div class="font-bold text-gray-800">${p.name}</div>
                        <div class="text-xs text-gray-400 font-mono">${p.imei_sn ? p.imei_sn : 'No Serial Specified'}</div>
                    </td>
                    <td class="p-3"><span class="px-2 py-1 text-xs font-semibold bg-gray-100 rounded text-gray-700">${p.category || 'Others'}</span></td>
                    <td class="p-3 text-gray-600 text-xs truncate max-w-[120px]">${p.supplier || 'Unassigned'}</td>
                    <td class="p-3 text-right font-medium text-gray-600">GH₵ ${parseFloat(p.cost_price || 0).toFixed(2)}</td>
                    <td class="p-3 text-right font-bold text-blue-600">GH₵ ${parseFloat(p.price || 0).toFixed(2)}</td>
                    <td class="p-3 text-center">
                        <span class="inline-block px-2.5 py-0.5 text-xs font-extrabold rounded-full ${p.quantity <= 0 ? 'bg-red-100 text-red-800' : p.quantity <= 3 ? 'bg-yellow-100 text-yellow-800' : 'bg-green-100 text-green-800'}">
                            ${p.quantity}
                        </span>
                    </td>
                    <td class="p-3 text-center">
                        <button onclick="openProductModal('${p.id}')" class="text-blue-600 hover:text-blue-800 font-medium text-xs bg-blue-50 px-2.5 py-1 rounded border border-blue-100 transition">Modify</button>
                    </td>
                `;
                body.appendChild(row);
            });
        }

        // Form Control Modals
        function openProductModal(productId = null) {
            const modal = document.getElementById('product-modal');
            const form = document.getElementById('product-form');
            form.reset();
            document.getElementById('form-product-id').value = '';
            document.getElementById('modal-title').textContent = "Add New Stock Entry";

            if (productId) {
                const match = products.find(p => p.id === productId);
                if (match) {
                    document.getElementById('form-product-id').value = match.id;
                    document.getElementById('form-name').value = match.name || '';
                    document.getElementById('form-category').value = match.category || 'Phones';
                    document.getElementById('form-quantity').value = match.quantity ?? 1;
                    document.getElementById('form-cost-price').value = match.cost_price ?? 0.00;
                    document.getElementById('form-price').value = match.price || '';
                    document.getElementById('form-imei').value = match.imei_sn || '';
                    document.getElementById('form-supplier').value = match.supplier || '';
                    document.getElementById('modal-title').textContent = "Edit Product Parameters";
                }
            }

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('.transform').classList.remove('scale-95');
            }, 50);
        }

        function closeProductModal() {
            const modal = document.getElementById('product-modal');
            modal.classList.add('opacity-0');
            modal.querySelector('.transform').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        // Transaction & Warehouse Storage Write Routine
        async function saveProduct(event) {
            event.preventDefault();
            const saveBtn = document.getElementById('save-btn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = `<span>Saving data...</span>`;

            const id = document.getElementById('form-product-id').value;
            const name = document.getElementById('form-name').value.trim();
            const category = document.getElementById('form-category').value;
            const quantity = parseInt(document.getElementById('form-quantity').value);
            const cost_price = parseFloat(document.getElementById('form-cost-price').value || 0);
            const price = parseFloat(document.getElementById('form-price').value);
            const imei_sn = document.getElementById('form-imei').value.trim();
            const supplier = document.getElementById('form-supplier').value.trim();

            // DYNAMIC MULTI-SCHEMA STRUCT PAYLOAD BUILDER
            // To ensure database write operations complete smoothly even if specific optional columns aren't supported.
            const rawPayload = { name, category, price, imei_sn, supplier };
            
            // Safe property injections matching whatever Supabase accepts
            rawPayload.quantity = quantity;
            rawPayload.stock = quantity; 
            rawPayload.qty = quantity;

            rawPayload.cost_price = cost_price;
            rawPayload.costPrice = cost_price;

            try {
                let error;
                if (id) {
                    // Updating record
                    const res = await supabase.from('products').update(rawPayload).eq('id', id);
                    error = res.error;
                } else {
                    // Inserting record
                    const res = await supabase.from('products').insert([rawPayload]);
                    error = res.error;
                }

                // SECURE COLUMN BREAKOUT RETRY ENGINE
                // If Supabase complains about cost_price/stock cache schema rules, strip them and run a safe fallback save
                if (error && error.message.includes('column')) {
                    console.warn("Schema restriction caught. Initiating sanitized table insert fallback...");
                    const fallbackPayload = { name, category, price, imei_sn, supplier };
                    
                    // Fallback to strict base configurations
                    if (!error.message.includes('quantity') && !error.message.includes('stock')) {
                        fallbackPayload.quantity = quantity;
                    }
                    
                    let retryRes;
                    if (id) {
                        retryRes = await supabase.from('products').update(fallbackPayload).eq('id', id);
                    } else {
                        retryRes = await supabase.from('products').insert([fallbackPayload]);
                    }
                    error = retryRes.error;
                }

                if (error) throw error;

                closeProductModal();
                await syncData();
            } catch (err) {
                console.error("Data storage exception:", err.message);
                alert("Database Exception: " + err.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = `<i data-lucide="save" class="w-4 h-4"></i><span>Save Record</span>`;
                lucide.createIcons();
            }
        }

        // Checkout & Batch Order Execution
        async function processCheckout() {
            if (cart.length === 0) return;
            const btn = document.getElementById('checkout-btn');
            btn.disabled = true;
            btn.textContent = "Processing order payloads...";

            try {
                // Perform batch updates sequentially across items
                for (const item of cart) {
                    const freshState = products.find(p => p.id === item.id);
                    const absoluteNewQuantity = Math.max(0, (freshState ? freshState.quantity : item.quantity) - item.orderQuantity);
                    
                    const updatePayload = {};
                    updatePayload.quantity = absoluteNewQuantity;
                    updatePayload.stock = absoluteNewQuantity;
                    updatePayload.qty = absoluteNewQuantity;

                    const { error } = await supabase.from('products').update(updatePayload).eq('id', item.id);
                    if (error) throw error;
                }

                // Trigger Receipt Component View Production
                spoolThermalReceipt(cart);

                // Clear structural local checkout parameters
                cart = [];
                syncCartState();
                await syncData();

            } catch (err) {
                console.error("Order completion error:", err.message);
                alert("Checkout Failed: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="badge-check" class="w-5 h-5"></i><span>Complete Order & Print</span>`;
                lucide.createIcons();
            }
        }

        // Mobile Safe Asynchronous Thermal Invoice Printer Engine
        function spoolThermalReceipt(receiptCart) {
            let runningSum = 0;
            const itemLines = receiptCart.map(item => {
                const sub = item.price * item.orderQuantity;
                runningSum += sub;
                return `
                    <div style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 3px;">
                        <span style="flex: 1; text-align: left;">${item.orderQuantity}x ${item.name}</span>
                        <span style="width: 80px; text-align: right;">GH₵ ${sub.toFixed(2)}</span>
                    </div>
                    ${item.imei_sn ? `<div style="font-size: 10px; color: #555; text-align: left; margin-bottom: 5px; padding-left: 15px;">IMEI/SN: ${item.imei_sn}</div>` : ''}
                `;
            }).join('');

            const receiptHTML = `
                <html>
                <head>
                    <style>
                        body { font-family: 'Courier New', Courier, monospace; width: 78mm; margin: 0; padding: 10px; color: #000; text-align: center; }
                        .line { border-top: 1px dashed #000; margin: 8px 0; }
                        .bold { font-weight: bold; }
                    </style>
                </head>
                <body>
                    <h3 style="margin: 0 0 4px 0; font-size: 16px; text-transform: uppercase;">Righteous Phones</h3>
                    <p style="margin: 0; font-size: 12px;">Mobile & Tech Accessories Hub</p>
                    <p style="margin: 2px 0 0 0; font-size: 11px;">Kumasi, Ghana</p>
                    <div class="line"></div>
                    <p style="font-size: 11px; text-align: left; margin: 0 0 5px 0;">Date: ${new Date().toLocaleString()}</p>
                    <div class="line"></div>
                    ${itemLines}
                    <div class="line"></div>
                    <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 15px; margin-top: 5px;">
                        <span>TOTAL PAID:</span>
                        <span>GH₵ ${runningSum.toFixed(2)}</span>
                    </div>
                    <div class="line"></div>
                    <p style="font-size: 12px; margin: 10px 0 0 0;" class="bold">Thank you for your business!</p>
                    <p style="font-size: 10px; margin: 2px 0 0 0; color: #444;">Items sealed are valid for warranty return matching store policies.</p>
                </body>
                </html>
            `;

            // Spool safely into hidden frame context to avoid browser pop-up block policies
            const iframe = document.getElementById('print-buffer-iframe');
            const doc = iframe.contentWindow.document || iframe.contentDocument;
            doc.open();
            doc.write(receiptHTML);
            doc.close();

            // Run asynchronous background thread execution
            setTimeout(() => {
                iframe.contentWindow.focus();
                iframe.contentWindow.print();
            }, 250);
        }
    </script>
</body>
</html>
