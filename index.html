<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPOS Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #interactive.viewport canvas.drawingBuffer { display: none; }
        #interactive.viewport video { width: 100%; height: auto; border-radius: 0.5rem; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <!-- Header -->
    <header class="bg-slate-800 border-b border-slate-700 p-4 sticky top-0 z-50 shadow-md">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-emerald-400 flex items-center gap-2">
                ⚡ SmartPOS <span class="text-xs bg-emerald-500/20 text-emerald-300 px-2 py-0.5 rounded-full border border-emerald-500/30">Pro</span>
            </h1>
            <div class="flex gap-2">
                <button onclick="toggleSection('salesPanel', this)" class="text-xs bg-slate-700 hover:bg-slate-600 border border-slate-600 px-2.5 py-1.5 rounded-lg font-medium transition">
                    📊 History
                </button>
                <button onclick="toggleSection('adminPanel', this)" class="text-xs bg-slate-700 hover:bg-slate-600 border border-slate-600 px-2.5 py-1.5 rounded-lg font-medium transition">
                    ⚙️ Stock
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4 pb-28">

        <!-- SALES HISTORY PANEL (Hidden by default) -->
        <div id="salesPanel" class="hidden bg-slate-800 border border-slate-700 rounded-xl p-4 shadow-xl space-y-3">
            <div class="flex justify-between items-center">
                <h2 class="text-sm font-semibold text-amber-400 uppercase tracking-wider flex items-center gap-1.5">
                    📊 Today's Sales Analytics
                </h2>
                <button onclick="clearSalesHistory()" class="text-[10px] text-rose-400 hover:underline">Reset Log</button>
            </div>
            
            <!-- Quick Dashboard Grid -->
            <div class="grid grid-cols-2 gap-2 text-center">
                <div class="bg-slate-900 border border-slate-700 p-2 rounded-lg">
                    <p class="text-[10px] text-slate-400 uppercase">Gross Revenue</p>
                    <p id="dashRevenue" class="text-lg font-black text-emerald-400">$0.00</p>
                </div>
                <div class="bg-slate-900 border border-slate-700 p-2 rounded-lg">
                    <p class="text-[10px] text-slate-400 uppercase">Orders Settled</p>
                    <p id="dashCount" class="text-lg font-black text-amber-400">0</p>
                </div>
            </div>

            <!-- Transaction List Stack -->
            <div id="salesLogStack" class="space-y-2 max-h-48 overflow-y-auto pr-1 pt-1">
                <p class="text-slate-500 text-xs italic text-center py-4">No transactions recorded today</p>
            </div>
        </div>

        <!-- ADMIN / PRODUCT MANAGEMENT PANEL (Hidden by default) -->
        <div id="adminPanel" class="hidden bg-slate-800 border border-slate-700 rounded-xl p-4 shadow-xl space-y-3">
            <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider flex items-center gap-1.5">
                📦 Add / Update Product Inventory
            </h2>
            <div class="space-y-2 text-xs">
                <div>
                    <label class="block text-slate-400 mb-1">Barcode</label>
                    <input id="adminBarcode" type="text" placeholder="Scan or type barcode..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-slate-100 focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-slate-400 mb-1">Product Name</label>
                    <input id="adminName" type="text" placeholder="e.g., iPhone 16 Pro Max Clear Case" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-slate-100 focus:outline-none focus:border-emerald-500">
                </div>
                <div>
                    <label class="block text-slate-400 mb-1">Retail Price ($)</label>
                    <input id="adminPrice" type="number" step="0.01" placeholder="0.00" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-slate-100 focus:outline-none focus:border-emerald-500">
                </div>
                <button onclick="saveProductFromAdmin()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold p-2.5 rounded-lg transition shadow-lg mt-2">
                    Save Product to Inventory
                </button>
            </div>
        </div>

        <!-- BARCODE SCANNER CAMERA VIEW -->
        <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 shadow-xl space-y-3">
            <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider">Barcode Scanner</h2>
            <div id="interactive" class="viewport relative bg-slate-950 rounded-lg overflow-hidden border border-slate-800 aspect-video flex items-center justify-center">
                <p id="scannerPlaceholder" class="text-slate-500 text-xs italic">Camera inactive</p>
            </div>
            <button onclick="startScanner()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold py-3 rounded-lg transition flex items-center justify-center gap-2 shadow-lg">
                📸 Initialize Rear Camera
            </button>
        </div>

        <!-- MANUAL ENTRY / LOOKUP -->
        <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 shadow-xl space-y-3">
            <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider">Manual Entry / Lookup</h2>
            <div class="flex gap-2">
                <input id="manualBarcode" type="text" placeholder="Type barcode manually..." class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-emerald-500">
                <button onclick="handleManualLookup()" class="bg-slate-700 hover:bg-slate-600 px-4 rounded-lg text-sm font-medium border border-slate-600 transition">Add</button>
            </div>
        </div>

        <!-- CURRENT CART -->
        <div class="bg-slate-800 border border-slate-700 rounded-xl p-4 shadow-xl space-y-3">
            <div class="flex justify-between items-center">
                <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider">Current Cart</h2>
                <button onclick="clearCart()" class="text-xs text-rose-400 hover:underline">Clear All</button>
            </div>
            <div id="cartItems" class="space-y-2 max-h-60 overflow-y-auto pr-1">
                <p class="text-slate-500 text-xs italic text-center py-4">Scan an item or use manual entry to begin checkout</p>
            </div>
        </div>

    </main>

    <!-- Bottom Total Bar -->
    <div class="fixed bottom-0 left-0 right-0 bg-slate-800 border-t border-slate-700 p-4 shadow-2xl z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-xs text-slate-400 font-medium uppercase tracking-wider">Total Amount</p>
                <p id="cartTotal" class="text-2xl font-black text-emerald-400">$0.00</p>
            </div>
            <button onclick="checkoutTransaction()" class="bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-extrabold px-6 py-3 rounded-xl transition shadow-lg text-sm tracking-wide">
                COMPLETE SALE
            </button>
        </div>
    </div>

    <!-- AUDIO FEEDBACK -->
    <audio id="beepAudio" src="https://assets.mixkit.co/active_storage/sfx/911/911-200.wav" preload="auto"></audio>

    <script>
        // App State Manager
        let cart = {};
        let localInventory = JSON.parse(localStorage.getItem('pos_inventory')) || {
            "123456": { name: "Sample Phone Case", price: 15.00 },
            "789012": { name: "USB-C Fast Charger Cable", price: 25.00 },
            "555555": { name: "Tempered Glass Screen Guard", price: 10.00 }
        };
        let salesHistory = JSON.parse(localStorage.getItem('pos_sales_history')) || [];

        // Run dashboard render immediately on startup
        renderSalesHistory();

        function saveInventoryToStorage() {
            localStorage.setItem('pos_inventory', JSON.stringify(localInventory));
        }

        function saveSalesToStorage() {
            localStorage.setItem('pos_sales_history', JSON.stringify(salesHistory));
        }

        function toggleSection(panelId, btn) {
            const panel = document.getElementById(panelId);
            const isHidden = panel.classList.contains('hidden');
            
            // Close other panels to preserve mobile screen real estate
            if (panelId === 'adminPanel') document.getElementById('salesPanel').classList.add('hidden');
            if (panelId === 'salesPanel') document.getElementById('adminPanel').classList.add('hidden');

            if (isHidden) {
                panel.classList.remove('hidden');
                panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else {
                panel.classList.add('hidden');
            }
        }

        function openAdminWithBarcode(barcode) {
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('salesPanel').classList.add('hidden');
            document.getElementById('adminBarcode').value = barcode;
            document.getElementById('adminName').focus();
        }

        function saveProductFromAdmin() {
            const barcode = document.getElementById('adminBarcode').value.trim();
            const name = document.getElementById('adminName').value.trim();
            const price = parseFloat(document.getElementById('adminPrice').value);

            if (!barcode || !name || isNaN(price)) {
                alert("Please fill in all fields correctly.");
                return;
            }

            localInventory[barcode] = { name: name, price: price };
            saveInventoryToStorage();
            
            document.getElementById('adminBarcode').value = '';
            document.getElementById('adminName').value = '';
            document.getElementById('adminPrice').value = '';
            
            alert(`📦 Saved successfully: ${name}`);
            addToCart(barcode);
        }

        function startScanner() {
            document.getElementById('scannerPlaceholder').style.display = 'none';
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#interactive'),
                    constraints: { facingMode: "environment" },
                },
                decoder: {
                    readers: ["ean_reader", "ean_8_reader", "code_128_reader", "code_39_reader"]
                }
            }, function(err) {
                if (err) {
                    console.error(err);
                    alert("Camera initialization failed.");
                    return;
                }
                Quagga.start();
            });
        }

        let lastScannedCode = null;
        let lastScanTime = 0;

        Quagga.onDetected(function(result) {
            const code = result.codeResult.code;
            const now = Date.now();
            if (code === lastScannedCode && (now - lastScanTime < 2500)) return;
            
            lastScannedCode = code;
            lastScanTime = now;
            
            document.getElementById('beepAudio').play();
            addToCart(code);
        });

        function handleManualLookup() {
            const input = document.getElementById('manualBarcode');
            const barcode = input.value.trim();
            if (barcode) {
                addToCart(barcode);
                input.value = '';
            }
        }

        function addToCart(barcode) {
            const product = localInventory[barcode];
            if (!product) {
                const createNew = confirm(`Barcode [${barcode}] not found in inventory.\n\nRegister this product?`);
                if (createNew) openAdminWithBarcode(barcode);
                return;
            }

            if (cart[barcode]) {
                cart[barcode].quantity += 1;
            } else {
                cart[barcode] = { name: product.name, price: product.price, quantity: 1 };
            }
            renderCart();
        }

        function updateQuantity(barcode, delta) {
            if (!cart[barcode]) return;
            cart[barcode].quantity += delta;
            if (cart[barcode].quantity <= 0) delete cart[barcode];
            renderCart();
        }

        function clearCart() {
            cart = {};
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            container.innerHTML = '';
            const keys = Object.keys(cart);
            
            if (keys.length === 0) {
                container.innerHTML = '<p class="text-slate-500 text-xs italic text-center py-4">Scan an item or use manual entry to begin checkout</p>';
                document.getElementById('cartTotal').innerText = '$0.00';
                return;
            }
            
            let grandTotal = 0;
            keys.forEach(barcode => {
                const item = cart[barcode];
                const itemTotal = item.price * item.quantity;
                grandTotal += itemTotal;
                
                const row = document.createElement('div');
                row.className = "flex items-center justify-between bg-slate-900 border border-slate-700/60 p-2.5 rounded-xl text-xs";
                row.innerHTML = `
                    <div class="flex-1 min-w-0 pr-2">
                        <p class="font-semibold text-slate-200 truncate">${item.name}</p>
                        <p class="text-slate-400 font-mono mt-0.5">$${item.price.toFixed(2)} each</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="flex items-center bg-slate-800 border border-slate-600 rounded-lg overflow-hidden">
                            <button onclick="updateQuantity('${barcode}', -1)" class="px-2.5 py-1 hover:bg-slate-700 text-slate-300 font-bold">-</button>
                            <span class="px-2 text-slate-100 font-mono font-bold">${item.quantity}</span>
                            <button onclick="updateQuantity('${barcode}', 1)" class="px-2.5 py-1 hover:bg-slate-700 text-slate-300 font-bold">+</button>
                        </div>
                        <span class="font-mono font-bold text-slate-100 w-16 text-right">$${itemTotal.toFixed(2)}</span>
                    </div>
                `;
                container.appendChild(row);
            });
            document.getElementById('cartTotal').innerText = `$${grandTotal.toFixed(2)}`;
        }

        // --- SALES HISTORY & ANALYTICS WORKFLOW ---
        function checkoutTransaction() {
            const keys = Object.keys(cart);
            if (keys.length === 0) {
                alert("Your cart is empty.");
                return;
            }

            let transactionTotal = 0;
            let itemsCount = 0;
            let itemsSummary = [];

            keys.forEach(barcode => {
                const item = cart[barcode];
                transactionTotal += item.price * item.quantity;
                itemsCount += item.quantity;
                itemsSummary.push(`${item.name} (${item.quantity}x)`);
            });

            // Create Transaction Object
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const newSale = {
                time: timestamp,
                total: transactionTotal,
                count: itemsCount,
                details: itemsSummary.join(', ')
            };

            // Prepend to array to keep latest sale on top
            salesHistory.unshift(newSale);
            saveSalesToStorage();
            
            renderSalesHistory();
            clearCart();
            
            alert("🎉 Transaction processed & saved to history!");
        }

        function renderSalesHistory() {
            const logStack = document.getElementById('salesLogStack');
            logStack.innerHTML = '';

            if (salesHistory.length === 0) {
                logStack.innerHTML = '<p class="text-slate-500 text-xs italic text-center py-4">No transactions recorded today</p>';
                document.getElementById('dashRevenue').innerText = '$0.00';
                document.getElementById('dashCount').innerText = '0';
                return;
            }

            let totalRevenue = 0;
            salesHistory.forEach(sale => {
                totalRevenue += sale.total;

                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-700/50 p-2 rounded-lg text-[11px] space-y-0.5";
                card.innerHTML = `
                    <div class="flex justify-between font-bold text-slate-300">
                        <span class="text-slate-400 font-mono">${sale.time}</span>
                        <span class="text-emerald-400 font-mono">$${sale.total.toFixed(2)}</span>
                    </div>
                    <p class="text-slate-400 italic truncate">${sale.details}</p>
                `;
                logStack.appendChild(card);
            });

            document.getElementById('dashRevenue').innerText = `$${totalRevenue.toFixed(2)}`;
            document.getElementById('dashCount').innerText = salesHistory.length;
        }

        function clearSalesHistory() {
            if (confirm("Are you sure you want to completely clear today's analytics summary?")) {
                salesHistory = [];
                saveSalesToStorage();
                renderSalesHistory();
            }
        }
    </script>
</body>
</html>
