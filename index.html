<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Righteous POS - Portal Router</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script>
        // ROUTER ENGINE: Instantly direct traffic based on security session keys
        function routeUserSession() {
            if (localStorage.getItem('active_staff_id')) {
                // User is already authenticated, bypass login wall
                window.location.href = 'dashboard.html?v=rebuild2026';
            } else {
                // No active session found, force security challenge screen
                window.location.href = 'login.html';
            }
        }
        // Fire redirection immediately before page renders to prevent visual lag
        routeUserSession();
    </script>
</head>
<body class="bg-gray-900 text-gray-400 font-sans flex items-center justify-center min-h-screen p-4">

    <div class="text-center space-y-3">
        <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
        <p class="text-xs font-mono tracking-widest text-gray-500 uppercase">
            Opening Righteous POS Gateway...
        </p>
    </div>

</body>
</html>
