<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Righteous Phones & Accessories - POS</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body class="bg-[#040811] text-gray-100 font-sans min-h-screen pb-24 selection:bg-emerald-500/30">

  <!-- Main Header Container -->
  <header class="p-4 bg-[#0b0f19]/80 backdrop-blur-md sticky top-0 z-40 border-b border-gray-900 flex justify-between items-center">
    <div>
      <h1 class="text-base font-black tracking-tight text-white">Righteous Phones & Accessories</h1>
      <div class="flex items-center gap-1.5 mt-0.5">
        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
        <span class="text-[10px] text-gray-400 font-medium">Secure Terminal Connection Active</span>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button class="bg-indigo-950/40 text-indigo-400 border border-indigo-900/60 font-bold px-2.5 py-1.5 rounded-lg text-[10px] active:bg-indigo-900/50">Admin Mode</button>
      <button class="bg-gray-900 text-gray-400 font-bold px-2.5 py-1.5 rounded-lg text-[10px] border border-gray-800 active:bg-gray-800">Sign Out</button>
    </div>
  </header>

  <!-- Interactive POS Canvas Layout -->
  <main class="p-4 max-w-md mx-auto flex flex-col gap-5">

    <!-- Catalog Search Bar -->
    <div class="relative">
      <span class="absolute inset-y-0 left-3 flex items-center text-gray-500 pointer-events-none text-xs">🔍</span>
      <input id="catalog-search" type="text" placeholder="Search catalog by name or barcode..." class="w-full bg-[#0b0f19] border border-gray-800 rounded-xl pl-9 pr-4 py-2.5 text-xs text-white focus:outline-none focus:border-indigo-500 placeholder-gray-600 shadow-inner">
    </div>

    <!-- Category Selector Quick Filters -->
    <div class="flex items-center gap-2 overflow-x-auto pb-1 no-scrollbar">
      <button data-category="All" class="category-btn bg-indigo-600 text-white text-xs font-bold px-4 py-1.5 rounded-lg shrink-0 transition-all">All</button>
      <button data-category="Phones" class="category-btn bg-[#0b0f19] text-gray-400 border border-gray-800 text-xs font-bold px-4 py-1.5 rounded-lg shrink-0 transition-all">Phones</button>
      <button data-category="Accessories" class="category-btn bg-[#0b0f19] text-gray-400 border border-gray-800 text-xs font-bold px-4 py-1.5 rounded-lg shrink-0 transition-all">Accessories</button>
      <button data-category="Others" class="category-btn bg-[#0b0f19] text-gray-400 border border-gray-800 text-xs font-bold px-4 py-1.5 rounded-lg shrink-0 transition-all">Others</button>
    </div>

    <!-- Live Inventory Catalog Display -->
    <section>
      <h3 class="text-[10px] font-black uppercase text-gray-500 tracking-wider mb-2.5">Terminal Inventory</h3>
      <div id="inventory-grid" class="grid grid-cols-2 gap-3">
        <!-- JavaScript loads item nodes dynamically here -->
        <p class="text-xs text-gray-500 italic py-4 col-span-2 text-center">Syncing catalog parameters...</p>
      </div>
    </section>

    <!-- Interactive Checkout Basket Frame -->
    <section class="bg-[#070b14] border border-gray-900 rounded-2xl p-3 shadow-xl">
      <div class="flex justify-between items-center mb-3">
        <div class="flex items-center gap-1.5">
          <span class="text-xs">🛒</span>
          <h4 class="text-xs font-bold text-gray-200">Current Receipt ( <span id="cart-item-count" class="text-indigo-400 font-black">0</span> )</h4>
        </div>
        <button id="clear-all-btn" class="text-[10px] font-bold text-gray-500 active:text-red-400 transition-colors">Clear All</button>
      </div>

      <!-- Real-time Cart Grid Container -->
      <div id="cart-wrapper" class="flex flex-col gap-2 max-h-48 overflow-y-auto pr-1">
        <p class="text-[11px] text-gray-500 text-center py-4 italic">Basket is empty. Tap products to add.</p>
      </div>

      <!-- Live Bill Summation Bar -->
      <div class="mt-4 pt-3 border-t border-gray-900 flex justify-between items-end">
        <div>
          <p class="text-[9px] font-bold uppercase text-gray-500 tracking-wide">Total Bill:</p>
          <p id="cart-total" class="text-base font-black text-emerald-400 mt-0.5">GH₵ 0.00</p>
        </div>
        <button id="checkout-action-btn" disabled class="bg-gray-800 text-gray-500 font-bold text-xs px-5 py-2.5 rounded-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed">
          Complete Order & Log Sale
        </button>
      </div>
    </section>

  </main>

  <!-- Mobile Screen Bottom Dock Utilities -->
  <nav class="fixed bottom-0 inset-x-0 bg-[#070b14]/90 backdrop-blur-md border-t border-gray-900 py-2.5 px-4 z-40 flex justify-between items-center max-w-md mx-auto">
    <button class="flex flex-col items-center gap-1 flex-1 text-gray-500 active:text-white">
      <span class="text-sm">🏠</span><span class="text-[9px] font-medium">Home</span>
    </button>
    <button class="flex flex-col items-center gap-1 flex-1 text-indigo-400 font-bold">
      <span class="text-sm">🛒</span><span class="text-[9px]">Sales</span>
    </button>
    <button class="flex flex-col items-center gap-1 flex-1 text-gray-500 active:text-white">
      <span class="text-sm">📦</span><span class="text-[9px] font-medium">Stock</span>
    </button>
    <button class="flex flex-col items-center gap-1 flex-1 text-gray-500 active:text-white">
      <span class="text-sm">👥</span><span class="text-[9px] font-medium">Debts</span>
    </button>
    <button class="flex flex-col items-center gap-1 flex-1 text-gray-500 active:text-white">
      <span class="text-sm">⚙️</span><span class="text-[9px] font-medium">Settings</span>
    </button>
  </nav>

  <!-- Core POS Terminal JavaScript Operations Block -->
  <script>
    // --- 1. CLOUD APPLICATION INITIALIZATION ---
    // PASTE YOUR ACTUAL INITIALIZATION KEYS DIRECTLY INSIDE THE STRINGS BELOW:
    const SUPABASE_URL = "YOUR_SUPABASE_URL";
    const SUPABASE_ANON_KEY = "YOUR_SUPABASE_ANON_KEY";
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- 2. POS CORE MEMORY STATE CACHES ---
    let allProducts = [];
    let salesCart = [];
    let targetedCategory = "All";
    let searchFilterQuery = "";

    // DOM UI Hooks Cache
    const inventoryGrid = document.getElementById('inventory-grid');
    const cartWrapper = document.getElementById('cart-wrapper');
    const cartItemCountText = document.getElementById('cart-item-count');
    const cartTotalText = document.getElementById('cart-total');
    const checkoutActionBtn = document.getElementById('checkout-action-btn');
    const catalogSearchInput = document.getElementById('catalog-search');
    const clearAllBtn = document.getElementById('clear-all-btn');

    // --- 3. DATABASE CALL ENGINE ---
    async function fetchProducts() {
      try {
        const { data, error } = await supabase
          .from('products')
          .select('*')
          .order('name', { ascending: true });
        
        if (error) throw error;
        allProducts = data || [];
        renderInventoryCatalog();
      } catch (err) {
        console.error("Catalog download failure:", err.message);
      }
    }

    // --- 4. CATALOG INTERFACE VIEW CONTROLLER ---
    function renderInventoryCatalog() {
      if(!inventoryGrid) return;

      const workingSet = allProducts.filter(product => {
        const matchesCategory = (targetedCategory === "All" || product.category === targetedCategory);
        const nameText = (product.name || '').toLowerCase();
        const barcodeText = (product.barcode || '').toLowerCase();
        const searchLow = searchFilterQuery.toLowerCase();
        const matchesSearch = (nameText.includes(searchLow) || barcodeText.includes(searchLow));
        return matchesCategory && matchesSearch;
      });

      if (workingSet.length === 0) {
        inventoryGrid.innerHTML = `<p class="text-xs text-gray-500 italic py-6 text-center col-span-2">No matching inventory found.</p>`;
        return;
      }

      inventoryGrid.innerHTML = workingSet.map(product => {
        return `
          <div class="bg-[#0b0f19] p-3 rounded-xl border border-gray-900 flex flex-col justify-between shadow-md relative overflow-hidden group">
            <div>
              <span class="text-[9px] bg-indigo-950 text-indigo-400 border border-indigo-900/40 px-1.5 py-0.5 rounded font-bold">${product.category || 'Others'}</span>
              <h4 class="text-gray-100 font-bold text-xs mt-2 truncate">${product.name}</h4>
              <div class="flex items-center justify-between mt-1">
                <p class="text-[11px] font-black text-emerald-400">GH₵ ${parseFloat(product.price).toFixed(2)}</p>
                <span class="text-[9px] text-gray-500 font-extrabold bg-gray-950/80 px-1 rounded border border-gray-900">Qty: ${product.stock}</span>
              </div>
            </div>
            <button data-action-id="${product.id}" type="button" class="mt-3 w-full bg-indigo-950/40 text-indigo-400 border border-indigo-900/50 hover:border-indigo-600 font-bold py-1.5 rounded-lg text-[10px] flex items-center justify-center gap-1 active:bg-indigo-600 active:text-white transition-all">
              🛒 Select to Cart
            </button>
          </div>
        `;
      }).join('');
    }

    // --- 5. COMPREHENSIVE BASKET CALCULATION ENGINES ---
    function syncCartInterface() {
      if(!cartWrapper) return;
      let itemsTotalCount = 0, totalBillAmount = 0;

      if (salesCart.length === 0) {
        cartWrapper.innerHTML = `<p class="text-[11px] text-gray-500 text-center py-4 italic">Basket is empty. Tap products to add.</p>`;
        if(cartItemCountText) cartItemCountText.innerText = "0";
        if(cartTotalText) cartTotalText.innerText = "GH₵ 0.00";
        if(checkoutActionBtn) {
          checkoutActionBtn.disabled = true;
          checkoutActionBtn.className = "bg-gray-800 text-gray-500 font-bold text-xs px-5 py-2.5 rounded-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed";
        }
        return;
      }

      cartWrapper.innerHTML = salesCart.map(item => {
        itemsTotalCount += item.quantity;
        totalBillAmount += (item.price * item.quantity);
        return `
          <div class="bg-[#0b0f19] p-2.5 rounded-xl border border-gray-900 flex justify-between items-center shadow-sm">
            <div class="min-w-0 flex-1 pr-2">
              <h5 class="text-gray-200 font-bold truncate text-[11px]">${item.name}</h5>
              <p class="text-[10px] text-emerald-400 font-extrabold mt-0.5">GH₵ ${item.price.toFixed(2)}</p>
            </div>
            <!-- Robust Mobile Click Targets (w-8 h-8 Touchboxes) -->
            <div class="flex items-center gap-1 bg-gray-950 border border-gray-900 rounded-lg p-0.5 select-none">
              <button data-cart-id="${item.id}" data-delta="-1" type="button" class="w-8 h-8 flex items-center justify-center font-black text-gray-400 active:text-white text-sm active:bg-gray-800 rounded-md transition-all">-</button>
              <span class="font-extrabold text-white text-[11px] min-w-[20px] text-center">${item.quantity}</span>
              <button data-cart-id="${item.id}" data-delta="1" type="button" class="w-8 h-8 flex items-center justify-center font-black text-gray-400 active:text-white text-sm active:bg-gray-800 rounded-md transition-all">+</button>
            </div>
          </div>
        `;
      }).join('');

      if(cartItemCountText) cartItemCountText.innerText = itemsTotalCount;
      if(cartTotalText) cartTotalText.innerText = `GH₵ ${totalBillAmount.toFixed(2)}`;
      if(checkoutActionBtn) {
        checkoutActionBtn.disabled = false;
        checkoutActionBtn.className = "bg-emerald-600 text-white font-black text-xs px-5 py-2.5 rounded-xl hover:bg-emerald-500 shadow-lg shadow-emerald-950/20 active:scale-[0.98] transition-all";
      }
    }

    function modifyCartDelta(id, delta) {
      // Robust string-to-string conversion to bypass data-type mismatches
      const product = allProducts.find(p => String(p.id) === String(id));
      if (!product) return;

      const activeIndex = salesCart.findIndex(item => String(item.id) === String(id));

      if (activeIndex > -1) {
        const nextQuantity = salesCart[activeIndex].quantity + delta;
        if (nextQuantity <= 0) {
          salesCart.splice(activeIndex, 1);
        } else {
          if (nextQuantity > product.stock) {
            alert(`Stock allocation limit reached. Only ${product.stock} units available.`);
            return;
          }
          salesCart[activeIndex].quantity = nextQuantity;
        }
      } else if (delta > 0) {
        if (product.stock <= 0) {
          alert("Product inventory is completely exhausted.");
          return;
        }
        salesCart.push({
          id: product.id,
          name: product.name,
          price: parseFloat(product.price || 0),
          cost: parseFloat(product.cost || 0),
          quantity: 1
        });
      }
      syncCartInterface();
    }

    // --- 6. ATOMIC TRANSACTION PROCESSING MACHINE ---
    async function executeCheckoutTransaction() {
      if (salesCart.length === 0) return;

      checkoutActionBtn.disabled = true;
      checkoutActionBtn.innerText = "Processing...";

      let totalBillAmount = 0;
      let totalProfitAmount = 0;

      salesCart.forEach(item => {
        totalBillAmount += (item.price * item.quantity);
        totalProfitAmount += ((item.price - item.cost) * item.quantity);
      });

      try {
        // 1. Bulk Update Catalog Inventory Decrements Row-by-Row
        for (const item of salesCart) {
          const match = allProducts.find(p => String(p.id) === String(item.id));
          if (!match) throw new Error(`Product match sequence broken for item: ${item.name}`);
          
          const adjustedStock = match.stock - item.quantity;
          const { error: stockErr } = await supabase
            .from('products')
            .update({ stock: adjustedStock })
            .eq('id', item.id);

          if (stockErr) throw stockErr;
        }

        // 2. Transmit Single Consolidated Sale Entry to PostGres
        const { error: invoiceErr } = await supabase
          .from('sales')
          .insert([{
            items: salesCart,
            total_bill: totalBillAmount,
            total_profit: totalProfitAmount
          }]);

        if (invoiceErr) throw invoiceErr;

        // 3. Assemble Virtual 58mm POS Receipt Matrix Data
        const cleanReceiptMarkup = `
          <html>
            <head>
              <title>Print Receipt</title>
              <style>
                body { font-family: monospace; width: 58mm; margin: 0; padding: 4px; font-size: 11px; color: #000; }
                .center { text-align: center; }
                .bold { font-weight: bold; }
                .divider { border-top: 1px dashed #000; margin: 6px 0; }
                .row { display: flex; justify-content: space-between; }
              </style>
            </head>
            <body>
              <div class="center bold text-transform: uppercase;">Righteous Phones</div>
              <div class="center">Accra, Ghana</div>
              <div class="divider"></div>
              ${salesCart.map(i => `
                <div class="row">
                  <span>${i.name} (x${i.quantity})</span>
                  <span>GH₵ ${(i.price * i.quantity).toFixed(2)}</span>
                </div>
              `).join('')}
              <div class="divider"></div>
              <div class="row bold" style="font-size: 12px;">
                <span>TOTAL AMOUNT:</span>
                <span>GH₵ ${totalBillAmount.toFixed(2)}</span>
              </div>
              <div class="divider"></div>
              <div class="center" style="margin-top: 8px;">Transaction Saved Successfully.<br>Thank you for your business!</div>
            </body>
          </html>
        `;

        // 4. Safe Mobile Popup Window Opener Handler
        const printWindow = window.open('', '_blank', 'width=300,height=500');

        if (printWindow) {
          printWindow.document.write(cleanReceiptMarkup);
          printWindow.document.close();
          printWindow.focus();
          setTimeout(() => {
            printWindow.print();
            printWindow.close();
          }, 280);
        } else {
          // INTERCEPT MODAL FALLBACK: Prevents browser crashes if popup is blocked
          const inlineModalOverlay = document.createElement('div');
          inlineModalOverlay.id = 'receipt-modal-overlay';
          inlineModalOverlay.className = 'fixed inset-0 bg-black/80 backdrop-blur-md z-[9999] flex items-center justify-center p-4 overflow-y-auto animate-fade-in';
          
          inlineModalOverlay.innerHTML = `
            <div class="bg-white text-black p-5 rounded-2xl shadow-2xl w-full max-w-xs font-mono text-[11px] border-4 border-dashed border-gray-300">
              <div class="text-center border-b border-dashed border-gray-400 pb-3 mb-3">
                <h3 class="font-black text-sm tracking-tight text-black">RIGHTEOUS PHONES</h3>
                <p class="text-[9px] text-gray-500 font-sans tracking-wide mt-0.5">Mobile Receipt Preview</p>
              </div>
              
              <div class="receipt-body text-left leading-tight my-4 flex flex-col gap-1.5">
                ${salesCart.map(item => `
                  <div class="flex justify-between">
                    <span class="truncate pr-1">${item.name} x${item.quantity}</span>
                    <span class="shrink-0 font-bold">GH₵ ${(item.price * item.quantity).toFixed(2)}</span>
                  </div>
                `).join('')}
                <div class="border-t border-dashed border-gray-400 my-2"></div>
                <div class="flex justify-between text-xs font-black">
                  <span>TOTAL BILL:</span>
                  <span>GH₵ ${totalBillAmount.toFixed(2)}</span>
                </div>
              </div>

              <div class="mt-5 pt-1 border-t border-dashed border-gray-400 flex flex-col gap-2">
                <button onclick="window.print()" class="w-full bg-emerald-600 text-white py-2.5 rounded-xl font-sans font-black text-xs shadow-md active:bg-emerald-700">
                  Print Receipt
                </button>
                <button onclick="document.getElementById('receipt-modal-overlay').remove();" class="w-full bg-gray-100 text-gray-700 py-2 rounded-xl font-sans font-bold text-xs active:bg-gray-200">
                  Dismiss & Clear Cart
                </button>
              </div>
            </div>
          `;
          document.body.appendChild(inlineModalOverlay);
        }

        // 5. Reset Workspace Memory for the next Customer
        salesCart = [];
        syncCartInterface();
        await fetchProducts();

      } catch (txError) {
        alert(`Checkout failed: ${txError.message}`);
      } finally {
        checkoutActionBtn.disabled = false;
        checkoutActionBtn.innerText = "Complete Order & Log Sale";
      }
    }

    // --- 7. EVENT ACTION LISTENERS BINDING LOOP ---
    if(inventoryGrid) {
      inventoryGrid.addEventListener('click', (e) => {
        const targetingBtn = e.target.closest('[data-action-id]');
        if (targetingBtn) {
          const productRefId = targetingBtn.getAttribute('data-action-id');
          modifyCartDelta(productRefId, 1);
        }
      });
    }

    if(cartWrapper) {
      cartWrapper.addEventListener('click', (e) => {
        const preciseButton = e.target.closest('[data-cart-id]');
        if (preciseButton) {
          e.preventDefault();
          e.stopPropagation(); // Shield mobile webview from executing phantom clicks
          const itemID = preciseButton.getAttribute('data-cart-id');
          const deltaIncrement = parseInt(preciseButton.getAttribute('data-delta'), 10);
          modifyCartDelta(itemID, deltaIncrement);
        }
      });
    }

    document.querySelectorAll('.category-btn').forEach(button => {
      button.addEventListener('click', (e) => {
        document.querySelectorAll('.category-btn').forEach(b => {
          b.className = "category-btn bg-[#0b0f19] text-gray-400 border border-gray-800 text-xs font-bold px-4 py-1.5 rounded-lg shrink-0 transition-all";
        });
        e.currentTarget.className = "category-btn bg-indigo-600 text-white text-xs font-bold px-4 py-1.5 rounded-lg shrink-0 transition-all shadow-md shadow-indigo-950/40";
        targetedCategory = e.currentTarget.getAttribute('data-category');
        renderInventoryCatalog();
      });
    });

    if(catalogSearchInput) {
      catalogSearchInput.addEventListener('input', (e) => {
        searchFilterQuery = e.target.value;
        renderInventoryCatalog();
      });
    }

    if(clearAllBtn) {
      clearAllBtn.addEventListener('click', () => {
        salesCart = [];
        syncCartInterface();
      });
    }

    if(checkoutActionBtn) {
      checkoutActionBtn.addEventListener('click', executeCheckoutTransaction);
    }

    // Initialize System Load
    fetchProducts();
  </script>
</body>
</html>
