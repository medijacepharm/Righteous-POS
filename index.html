<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Righteous POS Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans pb-32">

  <main class="p-4 max-w-md mx-auto space-y-4">
    
    <section id="view-dashboard" class="app-view space-y-4">
      <div class="bg-gradient-to-br from-slate-800 to-slate-900 p-4 rounded-xl border border-slate-700/60 shadow">
        <h2 class="text-sm font-semibold text-slate-300">Good morning, Admin 👋</h2>
        <p class="text-xs text-slate-400">Here's an overview of today's retail status.</p>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-slate-800/60 p-3.5 rounded-xl border border-slate-700/50">
          <span class="text-[10px] text-slate-400 block font-medium">Today's Sales</span>
          <span id="dash-sales-total" class="text-base font-bold text-emerald-400 mt-1 block">GH₵ 0.00</span>
        </div>
        <div class="bg-slate-800/60 p-3.5 rounded-xl border border-slate-700/50">
          <span class="text-[10px] text-slate-400 block font-medium">Profit Made</span>
          <span id="dash-profit-total" class="text-base font-bold text-cyan-400 mt-1 block">GH₵ 0.00</span>
        </div>
      </div>
    </section>

    <section id="view-sales" class="app-view hidden space-y-4">
      <div class="bg-slate-800 border border-slate-700 p-2.5 rounded-xl flex items-center gap-2">
        <input type="text" id="sales-search-bar" placeholder="Search catalog..." class="w-full bg-transparent text-xs text-white outline-none" />
      </div>
      <div id="sales-products-grid" class="grid grid-cols-2 gap-3"></div>
      
      <div class="fixed bottom-14 left-0 right-0 bg-slate-800 border-t border-slate-700 p-4 shadow-2xl max-w-md mx-auto">
        <div id="cart-items-wrapper" class="max-h-20 overflow-y-auto mb-2 text-xs"></div>
        <div class="flex justify-between items-center pt-2 border-t border-slate-700">
          <span id="cart-total-text" class="text-sm font-bold text-emerald-400">GH₵ 0.00</span>
          <button id="checkout-action-btn" class="bg-emerald-600 px-4 py-2 rounded text-xs" disabled>Complete</button>
        </div>
      </div>
    </section>

    <section id="view-inventory" class="app-view hidden space-y-4">
      <button id="trigger-add-view-btn" class="w-full bg-blue-600 p-2 rounded text-xs">+ Add Product</button>
      <div id="master-inventory-list" class="space-y-2"></div>
    </section>
  </main>

  <nav class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 p-2 z-50">
    <div class="max-w-md mx-auto flex justify-between">
      <button data-target="dashboard" class="nav-item text-emerald-400">🏠 Home</button>
      <button data-target="sales" class="nav-item text-slate-400">🛒 Sales</button>
      <button data-target="inventory" class="nav-item text-slate-400">📦 Stock</button>
    </div>
  </nav>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const db = createClient('https://ezdpxjjzemtxbmjyjmfi.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6ZHB4amp6ZW10eGJtanlqbWZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NzY5NDYsImV4cCI6MjA5NzM1Mjk0Nn0.ADcwJuefJxBC2h4iQHsTZ_Nixmlql_cGgGTIucxxgDw');

    // Routing and Data Logic
    const switchView = (id) => {
      document.querySelectorAll('.app-view').forEach(v => v.classList.add('hidden'));
      document.getElementById(`view-${id}`).classList.remove('hidden');
    };

    document.querySelectorAll('.nav-item').forEach(btn => 
      btn.addEventListener('click', () => switchView(btn.getAttribute('data-target')))
    );

    // Load data from Supabase
    async function loadData() {
      const { data } = await db.from('products').select('*');
      console.log("Loaded products:", data);
      // Implementation of rendering logic would go here
    }
    
    loadData();
  </script>
</body>
</html>
