<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Righteous POS - Sales Log</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">📊 Sales Ledger</h1>
            <a href="dashboard.html?v=rebuild2026" class="bg-blue-700 text-xs px-3 py-1 rounded-full font-semibold">↩ Go to POS</a>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-4 pb-12">
        
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-200">
                <span class="text-[10px] uppercase font-bold tracking-wider text-gray-400 block">Total Revenue</span>
                <p id="totalRevenue" class="text-xl font-extrabold text-gray-900">GHS 0.00</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-200">
                <span class="text-[10px] uppercase font-bold tracking-wider text-gray-400 block text-emerald-600">Net Profit</span>
                <p id="totalProfit" class="text-xl font-extrabold text-emerald-600">GHS 0.00</p>
            </div>
        </div>

        <div class="flex justify-between items-center pt-2">
            <h2 class="text-sm font-bold uppercase text-gray-500">Transaction History</h2>
            <span id="invoiceCount" class="text-xs font-mono bg-gray-200 text-gray-700 px-2 py-0.5 rounded-sm">0 trades</span>
        </div>

        <div class="space-y-3" id="salesFeedContainer">
            <div class="text-center py-8 text-gray-400 text-sm font-mono">> Fetching live financial ledger entries...</div>
        </div>

    </main>

    <script>
        // SESSION GUARD: Kick unauthenticated users back to the lock screen instantly
        if (!localStorage.getItem('active_staff_id')) {
            window.location.href = 'login.html';
        }

        // Supabase Live Client Connection Core Configurations
        const SUPABASE_URL = 'https://ezdpxjjzemtxbmjyjmfi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6ZHB4amp6ZW10eGJtanlqbWZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NzY5NDYsImV4cCI6MjA5NzM1Mjk0Nn0.ADcwJuefJxBC2h4iQHsTZ_Nixmlql_cGgGTIucxxgDw';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const feedContainer = document.getElementById('salesFeedContainer');
        const revenueText = document.getElementById('totalRevenue');
        const profitText = document.getElementById('totalProfit');
        const countBadge = document.getElementById('invoiceCount');

        async function fetchSalesLedgerEngine() {
            try {
                // Fetch sales rows in reverse chronological order
                const { data: salesHistory, error } = await supabaseClient
                    .from('sales')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!salesHistory || salesHistory.length === 0) {
                    feedContainer.innerHTML = `<div class="text-center py-8 text-gray-400 text-sm font-mono">> No sales processed yet. Get caching!</div>`;
                    return;
                }

                // Reset calculations counters
                let aggregatedRevenue = 0;
                let aggregatedProfit = 0;
                feedContainer.innerHTML = '';

                countBadge.textContent = `${salesHistory.length} sales`;

                salesHistory.forEach(sale => {
                    aggregatedRevenue += parseFloat(sale.net_amount);
                    aggregatedProfit += parseFloat(sale.profit_generated);

                    // Clean timestamp presentation format
                    const timestamp = new Date(sale.created_at);
                    const formattedTime = timestamp.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    const formattedDate = timestamp.toLocaleDateString([], {month: 'short', day: 'numeric'});

                    // Select badge color depending on payment type
                    const methodColor = sale.payment_method === 'Cash' 
                        ? 'bg-amber-100 text-amber-800 border-amber-200' 
                        : 'bg-purple-100 text-purple-800 border-purple-200';

                    const cardHtml = `
                        <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-200 space-y-3">
                            <div class="flex justify-between items-start">
                                <div>
                                    <span class="font-mono font-bold text-gray-800 text-sm">${sale.invoice_number}</span>
                                    <span class="text-[10px] text-gray-400 block mt-0.5">${formattedDate} at ${formattedTime}</span>
                                </div>
                                <span class="px-2 py-0.5 rounded border text-[10px] font-bold uppercase tracking-wide ${methodColor}">
                                    ${sale.payment_method}
                                </span>
                            </div>

                            <div class="pt-2 border-t border-gray-100 flex justify-between items-center text-xs">
                                <div>
                                    <span class="text-[9px] block uppercase font-medium text-gray-400">Collected Total</span>
                                    <span class="font-extrabold text-gray-900 text-sm">GHS ${parseFloat(sale.net_amount).toFixed(2)}</span>
                                </div>
                                <div class="text-right">
                                    <span class="text-[9px] block uppercase font-medium text-gray-400 text-emerald-600">Net Profit Margin</span>
                                    <span class="font-bold text-emerald-600 text-sm">+GHS ${parseFloat(sale.profit_generated).toFixed(2)}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    feedContainer.innerHTML += cardHtml;
                });

                // Render dynamic total balances back up onto summary widgets
                revenueText.textContent = `GHS ${aggregatedRevenue.toFixed(2)}`;
                profitText.textContent = `GHS ${aggregatedProfit.toFixed(2)}`;

            } catch (err) {
                feedContainer.innerHTML = `<div class="text-center py-8 text-red-400 text-sm font-mono">> Audit Engine Error: ${err.message}</div>`;
            }
        }

        // Auto trigger compilation loops on initialization load states
        window.addEventListener('DOMContentLoaded', fetchSalesLedgerEngine);
    </script>
</body>
</html>
