<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Righteous POS - Inventory Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">📦 Stock Room</h1>
            <div class="flex gap-2">
                <a href="stock-in.html" class="bg-emerald-500 text-xs px-3 py-1.5 rounded-lg font-bold shadow-xs flex items-center">➕ Intake</a>
                <a href="dashboard.html?v=rebuild2026" class="bg-blue-700 text-xs px-3 py-1.5 rounded-lg font-semibold flex items-center">↩ POS</a>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-4 pb-12">
        
        <details class="bg-white rounded-xl shadow-xs border border-gray-200 group overflow-hidden">
            <summary class="p-4 font-bold text-sm text-gray-700 cursor-pointer list-none flex justify-between items-center select-none bg-gray-50">
                <span>✨ Add Brand New Item to Catalog</span>
                <span class="transition-transform group-open:rotate-180 text-xs text-gray-400">▼</span>
            </summary>
            <div class="p-4 border-t border-gray-150 space-y-3 bg-white text-xs">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block font-semibold text-gray-500 mb-1">Brand</label>
                        <input type="text" id="newBrand" placeholder="e.g. Apple, Samsung" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none">
                    </div>
                    <div>
                        <label class="block font-semibold text-gray-500 mb-1">Product Name</label>
                        <input type="text" id="newName" placeholder="e.g. iPhone 16 Pro" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block font-semibold text-gray-500 mb-1">Category</label>
                        <select id="newCategory" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none">
                            <option value="Smartphones">Smartphones</option>
                            <option value="Accessories">Accessories</option>
                            <option value="Tablets">Tablets</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-semibold text-gray-500 mb-1">SKU / Barcode</label>
                        <input type="text" id="newSku" placeholder="e.g. APP-IPH16P" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none font-mono">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block font-semibold text-gray-500 mb-1">Cost Price (GHS)</label>
                        <input type="number" id="newCost" placeholder="0.00" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none">
                    </div>
                    <div>
                        <label class="block font-semibold text-gray-500 mb-1">Selling Price (GHS)</label>
                        <input type="number" id="newSelling" placeholder="0.00" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block font-semibold text-gray-500 mb-1">Tracking Format</label>
                        <select id="newIsSerialized" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none font-medium">
                            <option value="false">Bulk Goods (Accessories/Cases)</option>
                            <option value="true">Serialized Goods (Requires IMEI)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-semibold text-gray-500 mb-1">Alert Reorder Level</label>
                        <input type="number" id="newReorder" value="2" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none">
                    </div>
                </div>

                <div id="initialBulkQtyRow" class="pt-1">
                    <label class="block font-semibold text-gray-500 mb-1">Initial Stock Quantity (For Bulk Items)</label>
                    <input type="number" id="newInitialQty" value="0" class="w-full p-2.5 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none">
                </div>

                <button id="saveProductBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl shadow-md transition active:scale-98 cursor-pointer mt-2">
                    📥 Save Product to Database
                </button>
            </div>
        </details>

        <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-200 flex justify-between items-center">
            <div>
                <h2 class="text-sm font-semibold uppercase text-gray-400">Total Catalog Items</h2>
                <p id="totalItemsCount" class="text-2xl font-bold text-gray-800">...</p>
            </div>
            <button id="refreshBtn" class="bg-gray-100 text-gray-600 p-2 rounded-lg text-sm font-medium hover:bg-gray-250 active:scale-95 transition cursor-pointer">
                🔄 Refresh
            </button>
        </div>

        <div class="space-y-3" id="inventoryContainer">
            <div class="text-center py-8 text-gray-400 text-sm font-mono">> Fetching live warehouse stock levels...</div>
        </div>

    </main>

    <script>
        // SESSION GUARD: Kick unauthenticated users back to the lock screen instantly
        if (!localStorage.getItem('active_staff_id')) {
            window.location.href = 'login.html';
        }

        const SUPABASE_URL = 'https://ezdpxjjzemtxbmjyjmfi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6ZHB4amp6ZW10eGJtanlqbWZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NzY5NDYsImV4cCI6MjA5NzM1Mjk0Nn0.ADcwJuefJxBC2h4iQHsTZ_Nixmlql_cGgGTIucxxgDw';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const container = document.getElementById('inventoryContainer');
        const totalCounter = document.getElementById('totalItemsCount');
        const refreshButton = document.getElementById('refreshBtn');

        // Dynamic Form Toggling Interface Logic
        document.getElementById('newIsSerialized').addEventListener('change', (e) => {
            const row = document.getElementById('initialBulkQtyRow');
            if (e.target.value === 'true') {
                row.classList.add('hidden');
                document.getElementById('newInitialQty').value = 0;
            } else {
                row.classList.remove('hidden');
            }
        });

        // CREATE ENGINE: Post a completely new product row configuration to Supabase
        document.getElementById('saveProductBtn').addEventListener('click', async () => {
            const btn = document.getElementById('saveProductBtn');
            const name = document.getElementById('newName').value.trim();
            const brand = document.getElementById('newBrand').value.trim();
            const category = document.getElementById('newCategory').value;
            const sku = document.getElementById('newSku').value.trim();
            const cost = parseFloat(document.getElementById('newCost').value) || 0;
            const selling = parseFloat(document.getElementById('newSelling').value) || 0;
            const isSerialized = document.getElementById('newIsSerialized').value === 'true';
            const reorder = parseInt(document.getElementById('newReorder').value) || 0;
            const initialQty = parseInt(document.getElementById('newInitialQty').value) || 0;

            if (!name || !brand || !sku) {
                return alert("Please fill out Name, Brand, and SKU parameters.");
            }

            btn.disabled = true;
            btn.textContent = "Saving to clouds...";

            try {
                const { error } = await supabaseClient.from('products').insert([{
                    name, brand, category, sku,
                    cost_price: cost,
                    selling_price: selling,
                    is_serialized: isSerialized,
                    reorder_level: reorder,
                    bulk_stock_quantity: isSerialized ? 0 : initialQty
                }]);

                if (error) throw error;

                // Reset form parameters cleanly
                document.getElementById('newName').value = '';
                document.getElementById('newBrand').value = '';
                document.getElementById('newSku').value = '';
                document.getElementById('newCost').value = '';
                document.getElementById('newSelling').value = '';
                document.querySelector('details').open = false;

                alert("🎉 New product added to database catalog successfully!");
                await loadInventoryEngine();

            } catch (err) {
                alert(`Catalog Creation Halted: ${err.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = "📥 Save Product to Database";
            }
        });

        // DELETE ENGINE: Purge an unlinked product record out of system arrays securely
        async function purgeProductFromDatabase(productId, productName) {
            const securityCheck = confirm(`Are you absolutely sure you want to delete "${productName}" from the store catalog?\n\nThis cannot be undone.`);
            if (!securityCheck) return;

            try {
                const { error } = await supabaseClient
                    .from('products')
                    .delete()
                    .eq('id', productId);

                if (error) {
                    // Handle relational constraints safely
                    if (error.code === '23503') {
                        throw new Error("This item cannot be deleted because it is linked to existing historic sales data, receipts, or live IMEI rows. To protect financial logs, the database has locked it.");
                    }
                    throw error;
                }

                alert("Product deleted cleanly.");
                await loadInventoryEngine();

            } catch (err) {
                alert(`Purge Denied: ${err.message}`);
            }
        }
        // Expose function execution context to global window frame for inline HTML button interaction loops
        window.purgeProductFromDatabase = purgeProductFromDatabase;

        // READ ENGINE: Load entire catalog inventory values
        async function loadInventoryEngine() {
            try {
                container.innerHTML = `<div class="text-center py-8 text-gray-400 text-sm font-mono">> Fetching live warehouse stock levels...</div>`;
                
                const { data: products, error: prodError } = await supabaseClient
                    .from('products')
                    .select('*')
                    .order('category', { ascending: false });

                if (prodError) throw prodError;

                const { data: imeis, error: imeiError } = await supabaseClient
                    .from('serialized_items')
                    .select('*')
                    .eq('status', 'Available');

                if (imeiError) throw imeiError;

                totalCounter.textContent = products.length;
                container.innerHTML = '';

                products.forEach(product => {
                    let liveStock = product.is_serialized 
                        ? imeis.filter(i => i.product_id === product.id).length 
                        : product.bulk_stock_quantity;

                    let itemImeis = product.is_serialized 
                        ? imeis.filter(i => i.product_id === product.id).map(i => i.imei_or_serial) 
                        : [];

                    const isLowStock = liveStock <= product.reorder_level;
                    const stockBadgeColor = isLowStock ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700';

                    let cardHtml = `
                        <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-200 space-y-2">
                            <div class="flex justify-between items-start">
                                <div>
                                    <span class="text-[10px] uppercase font-bold tracking-wider text-gray-400">${product.brand} · ${product.category}</span>
                                    <h3 class="font-bold text-gray-800 text-base leading-tight">${product.name}</h3>
                                    <p class="text-xs text-gray-400 font-mono mt-0.5">SKU: ${product.sku}</p>
                                </div>
                                <div class="flex flex-col items-end gap-2">
                                    <span class="px-2.5 py-1 rounded-full text-xs font-bold ${stockBadgeColor}">
                                        ${liveStock} left
                                    </span>
                                    <button onclick="window.purgeProductFromDatabase(${product.id}, '${product.name}')" class="text-[10px] font-bold text-red-500 hover:text-red-700 border border-red-200 px-2 py-0.5 rounded bg-red-50 cursor-pointer transition">
                                        🗑 Delete
                                    </button>
                                </div>
                            </div>
                            
                            <div class="pt-2 border-t border-gray-150 flex justify-between items-center">
                                <div>
                                    <span class="text-[10px] block uppercase font-semibold text-gray-400">Retail Price</span>
                                    <span class="text-sm font-extrabold text-gray-900">GHS ${parseFloat(product.selling_price).toFixed(2)}</span>
                                </div>
                                <div class="text-right">
                                    <span class="text-[10px] block uppercase font-semibold text-gray-400">Cost Basis</span>
                                    <span class="text-xs font-medium text-gray-500">GHS ${parseFloat(product.cost_price).toFixed(2)}</span>
                                </div>
                            </div>
                    `;

                    if (product.is_serialized && itemImeis.length > 0) {
                        cardHtml += `
                            <div class="mt-2 bg-gray-50 p-2.5 rounded-lg border border-gray-150">
                                <span class="text-[9px] uppercase font-bold text-gray-400 block mb-1">Available In-Store IMEIs:</span>
                                <div class="flex flex-wrap gap-1">
                                    ${itemImeis.map(imei => `<span class="bg-white text-gray-600 font-mono text-[10px] border border-gray-200 px-1.5 py-0.5 rounded-md shadow-2xs">${imei}</span>`).join('')}
                                </div>
                            </div>
                        `;
                    } else if (product.is_serialized && itemImeis.length === 0) {
                        cardHtml += `
                            <div class="mt-2 bg-red-50 p-2 rounded-lg text-center text-red-500 font-medium text-[11px]">
                                🚨 OUT OF STOCK: No registered tracking IMEIs found.
                            </div>
                        `;
                    }

                    cardHtml += `</div>`;
                    container.innerHTML += cardHtml;
                });

            } catch (err) {
                container.innerHTML = `<div class="text-center py-8 text-red-400 text-sm font-mono">> Error: ${err.message}</div>`;
            }
        }

        refreshButton.addEventListener('click', loadInventoryEngine);
        window.addEventListener('DOMContentLoaded', loadInventoryEngine);
    </script>
</body>
</html>
