<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Righteous POS - Inventory</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">📦 Stock Room</h1>
            <div class="flex gap-2">
                <a href="stock-in.html" class="bg-emerald-500 text-xs px-3 py-1.5 rounded-lg font-bold shadow-xs flex items-center">➕ Intake</a>
                <a href="dashboard.html?v=rebuild2026" class="bg-blue-700 text-xs px-3 py-1.5 rounded-lg font-semibold flex items-center">↩ POS</a>
            </div>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-4 pb-12">
        
        <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-200 flex justify-between items-center">
            <div>
                <h2 class="text-sm font-semibold uppercase text-gray-400">Total Catalog Items</h2>
                <p id="totalItemsCount" class="text-2xl font-bold text-gray-800">...</p>
            </div>
            <button id="refreshBtn" class="bg-gray-100 text-gray-600 p-2 rounded-lg text-sm font-medium hover:bg-gray-250 active:scale-95 transition cursor-pointer">
                🔄 Refresh
            </button>
        </div>

        <div class="space-y-3" id="inventoryContainer">
            <div class="text-center py-8 text-gray-400 text-sm font-mono">> Fetching live warehouse stock levels...</div>
        </div>

    </main>

    <script>
        // SESSION GUARD: Kick unauthenticated users back to the lock screen instantly
        if (!localStorage.getItem('active_staff_id')) {
            window.location.href = 'login.html';
        }

        // Supabase Live Client Connection Core Configurations
        const SUPABASE_URL = 'https://ezdpxjjzemtxbmjyjmfi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6ZHB4amp6ZW10eGJtanlqbWZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NzY5NDYsImV4cCI6MjA5NzM1Mjk0Nn0.ADcwJuefJxBC2h4iQHsTZ_Nixmlql_cGgGTIucxxgDw';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const container = document.getElementById('inventoryContainer');
        const totalCounter = document.getElementById('totalItemsCount');
        const refreshButton = document.getElementById('refreshBtn');

        async function loadInventoryEngine() {
            try {
                container.innerHTML = `<div class="text-center py-8 text-gray-400 text-sm font-mono">> Fetching live warehouse stock levels...</div>`;
                
                // 1. Read all products from database
                const { data: products, error: prodError } = await supabaseClient
                    .from('products')
                    .select('*')
                    .order('category', { ascending: false });

                if (prodError) throw prodError;

                // 2. Read all available tracking IMEIs from database
                const { data: imeis, error: imeiError } = await supabaseClient
                    .from('serialized_items')
                    .select('*')
                    .eq('status', 'Available');

                if (imeiError) throw imeiError;

                totalCounter.textContent = products.length;
                container.innerHTML = '';

                // 3. Render items to UI
                products.forEach(product => {
                    // Calculate live phone quantities based on real IMEIs remaining
                    let liveStock = product.is_serialized 
                        ? imeis.filter(i => i.product_id === product.id).length 
                        : product.bulk_stock_quantity;

                    // Filter matching IMEI numbers for display
                    let itemImeis = product.is_serialized 
                        ? imeis.filter(i => i.product_id === product.id).map(i => i.imei_or_serial) 
                        : [];

                    const isLowStock = liveStock <= product.reorder_level;
                    const stockBadgeColor = isLowStock ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700';

                    // Build item card html
                    let cardHtml = `
                        <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-200 space-y-2">
                            <div class="flex justify-between items-start">
                                <div>
                                    <span class="text-[10px] uppercase font-bold tracking-wider text-gray-400">${product.brand} · ${product.category}</span>
                                    <h3 class="font-bold text-gray-800 text-base leading-tight">${product.name}</h3>
                                    <p class="text-xs text-gray-400 font-mono mt-0.5">SKU: ${product.sku}</p>
                                </div>
                                <span class="px-2.5 py-1 rounded-full text-xs font-bold ${stockBadgeColor}">
                                    ${liveStock} left
                                </span>
                            </div>
                            
                            <div class="pt-2 border-t border-gray-150 flex justify-between items-center">
                                <div>
                                    <span class="text-[10px] block uppercase font-semibold text-gray-400">Retail Price</span>
                                    <span class="text-sm font-extrabold text-gray-900">GHS ${parseFloat(product.selling_price).toFixed(2)}</span>
                                </div>
                                <div class="text-right">
                                    <span class="text-[10px] block uppercase font-semibold text-gray-400">Cost Basis</span>
                                    <span class="text-xs font-medium text-gray-500">GHS ${parseFloat(product.cost_price).toFixed(2)}</span>
                                </div>
                            </div>
                    `;

                    // If it's a smartphone, show the list of available IMEIs physically in the store
                    if (product.is_serialized && itemImeis.length > 0) {
                        cardHtml += `
                            <div class="mt-2 bg-gray-50 p-2.5 rounded-lg border border-gray-150">
                                <span class="text-[9px] uppercase font-bold text-gray-400 block mb-1">Available In-Store IMEIs:</span>
                                <div class="flex flex-wrap gap-1">
                                    ${itemImeis.map(imei => `<span class="bg-white text-gray-600 font-mono text-[10px] border border-gray-200 px-1.5 py-0.5 rounded-md shadow-2xs">${imei}</span>`).join('')}
                                </div>
                            </div>
                        `;
                    } else if (product.is_serialized && itemImeis.length === 0) {
                        cardHtml += `
                            <div class="mt-2 bg-red-50 p-2 rounded-lg text-center text-red-500 font-medium text-[11px]">
                                🚨 OUT OF STOCK: No registered tracking IMEIs found.
                            </div>
                        `;
                    }

                    cardHtml += `</div>`;
                    container.innerHTML += cardHtml;
                });

            } catch (err) {
                container.innerHTML = `<div class="text-center py-8 text-red-400 text-sm font-mono">> Error: ${err.message}</div>`;
            }
        }

        // Event hooks
        refreshButton.addEventListener('click', loadInventoryEngine);
        window.addEventListener('DOMContentLoaded', loadInventoryEngine);
    </script>
</body>
</html>
