<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Righteous POS - Restock</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 text-gray-900 font-sans antialiased">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">📥 Inventory Intake</h1>
            <a href="products.html" class="bg-blue-700 text-xs px-3 py-1 rounded-full font-semibold">↩ Stock Room</a>
        </div>
    </header>

    <main class="max-w-xl mx-auto p-4 space-y-4 pb-12">
        
        <div class="bg-white p-5 rounded-xl shadow-xs border border-gray-200 space-y-4">
            <h2 class="text-base font-bold text-gray-800">Log Incoming Shipment</h2>
            
            <div>
                <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Select Item to Restock</label>
                <select id="restockProductSelect" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
                    <option value="">Loading live catalog items...</option>
                </select>
            </div>

            <div id="bulkInputRow" class="hidden">
                <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">Quantity Added</label>
                <input type="number" id="bulkQtyInput" value="1" min="1" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div id="serializedInputRow" class="hidden space-y-1">
                <label class="block text-xs font-semibold uppercase text-gray-500 mb-1">New Hardware IMEI Numbers</label>
                <p class="text-[10px] text-gray-400">Type or paste IMEIs. Separate multiple units with commas.</p>
                <textarea id="imeiTextArea" rows="3" placeholder="e.g. 351234567890123, 359876543210987" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-xs"></textarea>
            </div>

            <div id="intakeLog" class="hidden p-3 rounded-lg text-xs font-mono border"></div>

            <button id="submitIntakeBtn" class="w-full bg-blue-600 hover:bg-blue-700 active:scale-98 transition text-white py-3.5 px-4 rounded-xl font-bold text-sm tracking-wide shadow-md cursor-pointer">
                ➕ Process Intake Shipment
            </button>
        </div>

    </main>

    <script>
        // SESSION GUARD: Kick unauthenticated users back to the lock screen instantly
        if (!localStorage.getItem('active_staff_id')) {
            window.location.href = 'login.html';
        }

        // Supabase Live Client Connection Core Configurations
        const SUPABASE_URL = 'https://ezdpxjjzemtxbmjyjmfi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6ZHB4amp6ZW10eGJtanlqbWZpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NzY5NDYsImV4cCI6MjA5NzM1Mjk0Nn0.ADcwJuefJxBC2h4iQHsTZ_Nixmlql_cGgGTIucxxgDw';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const prodSelect = document.getElementById('restockProductSelect');
        const bulkRow = document.getElementById('bulkInputRow');
        const serialRow = document.getElementById('serializedInputRow');
        const intakeBtn = document.getElementById('submitIntakeBtn');
        const logBox = document.getElementById('intakeLog');

        let localCatalogCache = [];

        // Fetch product list down from database dynamically on initialization load
        async function fetchIntakeCatalog() {
            try {
                const { data: products, error } = await supabaseClient
                    .from('products')
                    .select('id, name, brand, is_serialized, bulk_stock_quantity')
                    .order('name');

                if (error) throw error;
                localCatalogCache = products;

                prodSelect.innerHTML = '<option value="">-- Choose Item From Shelves --</option>' + 
                    products.map(p => `<option value="${p.id}">${p.brand} ${p.name}</option>`).join('');

            } catch (err) {
                alert(`Catalog Fetch Failure: ${err.message}`);
            }
        }

        // Handle adaptive dynamic form configuration switching toggles
        prodSelect.addEventListener('change', () => {
            const matchedItem = localCatalogCache.find(p => p.id == prodSelect.value);
            if (!matchedItem) {
                bulkRow.classList.add('hidden');
                serialRow.classList.add('hidden');
                return;
            }

            if (matchedItem.is_serialized) {
                bulkRow.classList.add('hidden');
                serialRow.classList.remove('hidden');
            } else {
                bulkRow.classList.remove('hidden');
                serialRow.classList.add('hidden');
            }
        });

        // Trigger safe database execution updates pipeline scripts
        intakeBtn.addEventListener('click', async () => {
            const targetId = prodSelect.value;
            if (!targetId) return alert("Please select a product first.");

            const matchedItem = localCatalogCache.find(p => p.id == targetId);
            intakeBtn.disabled = true;
            logBox.className = "p-3 rounded-lg text-xs font-mono border bg-gray-50 border-gray-300 text-gray-700 block";
            logBox.textContent = "Processing supply intake request...";

            try {
                if (matchedItem.is_serialized) {
                    // Extract line string segments clean input arrays
                    const rawImeis = document.getElementById('imeiTextArea').value;
                    const cleanImeis = rawImeis.split(',')
                        .map(i => i.trim())
                        .filter(i => i.length > 0);

                    if (cleanImeis.length === 0) throw new Error("Please enter at least one valid IMEI number.");

                    // Build array collection payload elements to map directly to database rows
                    const rowsToInsert = cleanImeis.map(imei => ({
                        product_id: parseInt(targetId),
                        imei_or_serial: imei,
                        status: 'Available'
                    }));

                    const { error: insertErr } = await supabaseClient
                        .from('serialized_items')
                        .insert(rowsToInsert);

                    if (insertErr) throw insertErr;
                    
                    logBox.className = "p-3 rounded-lg text-xs font-mono border bg-green-50 border-green-300 text-green-700 block";
                    logBox.textContent = `🎉 Success! Registered ${cleanImeis.length} unique hardware IMEI rows into warehouse tracking profiles.`;
                    document.getElementById('imeiTextArea').value = '';

                } else {
                    // Add quantity value onto bulk accessories balances
                    const inputQty = parseInt(document.getElementById('bulkQtyInput').value) || 0;
                    if (inputQty <= 0) throw new Error("Intake quantity value must be greater than zero.");

                    const updatedQuantity = matchedItem.bulk_stock_quantity + inputQty;

                    const { error: updateErr } = await supabaseClient
                        .from('products')
                        .update({ bulk_stock_quantity: updatedQuantity })
                        .eq('id', targetId);

                    if (updateErr) throw updateErr;

                    // Update our cache metrics balances records
                    matchedItem.bulk_stock_quantity = updatedQuantity;

                    logBox.className = "p-3 rounded-lg text-xs font-mono border bg-green-50 border-green-300 text-green-700 block";
                    logBox.textContent = `🎉 Success! Augmented bulk supply profile by +${inputQty} units. New total: ${updatedQuantity} items in store.`;
                }

            } catch (err) {
                logBox.className = "p-3 rounded-lg text-xs font-mono border bg-red-50 border-red-300 text-red-700 block";
                logBox.textContent = `🚨 Intake Refused: ${err.message}`;
            } finally {
                intakeBtn.disabled = false;
            }
        });

        window.addEventListener('DOMContentLoaded', fetchIntakeCatalog);
    </script>
</body>
</html>
